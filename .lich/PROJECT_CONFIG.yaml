# Project Configuration

# This file is machine-readable for AI agents

project:
  name: "Zenith"
  slug: "zenith"
  type: "paas_platform"
  description: "FreeZenith — open-source self-hosted PaaS for Hetzner Cloud"
  edition: "community"   # community | enterprise

author:
  name: "Babak Doraniarab"
  email: "babak@dotech.fi"

stack:
  backend: go
  frontend: nextjs
  landing: nextjs
  database: postgresql
  cache: redis
  auth: keycloak
  gateway: apisix
  kubernetes: k3s
  helm: true
  operators: cnpg,keda,cert-manager

features:
  tls: yes
  observability: yes          # Loki, Prometheus, Grafana, Tempo
  managed_databases: yes
  auth_realms: yes
  structured_logging: yes
  temporal: enterprise-only   # plan-upgrade workflows, cluster autoscaler
  multi_tenant: enterprise-only

settings:
  default_language: en
  domain: localhost

ports:
  web: 3000
  mc: 3002
  landing: 4321
  api: 8080
  postgres: 5432
  redis: 6379

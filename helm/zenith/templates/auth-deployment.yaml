{{- if .Values.auth.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zenith.fullname" . }}-auth
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
spec:
  replicas: {{ .Values.auth.replicaCount }}
  selector:
    matchLabels:
      app: zenith-auth
      {{- include "zenith.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: zenith-auth
        {{- include "zenith.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "zenith.serviceAccountName" . }}
      containers:
        - name: auth
          image: "{{ .Values.auth.image.repository }}:{{ .Values.auth.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.auth.port }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .Values.auth.port }}"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "zenith.fullname" . }}-secrets
                  key: jwt-secret
            - name: ISSUER_URL
              value: "{{ .Values.auth.env.ISSUER_URL }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.auth.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zenith.fullname" . }}-auth
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
spec:
  type: {{ .Values.auth.service.type }}
  ports:
    - port: {{ .Values.auth.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: zenith-auth
    {{- include "zenith.selectorLabels" . | nindent 4 }}
{{- end }}

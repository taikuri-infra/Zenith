{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zenith.fullname" . }}-api
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: zenith-api
      {{- include "zenith.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: zenith-api
        {{- include "zenith.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "zenith.serviceAccountName" . }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .Values.api.port }}"
            - name: ENVIRONMENT
              value: "{{ .Values.api.env.ENVIRONMENT }}"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "zenith.fullname" . }}-secrets
                  key: jwt-secret
            - name: CORS_ORIGINS
              value: "{{ .Values.api.env.CORS_ORIGINS }}"
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ include "zenith.fullname" . }}-otel-collector.{{ include "zenith.namespace" . }}.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "zenith-api"
            - name: OTEL_INSECURE
              value: "true"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zenith.fullname" . }}-api
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: zenith-api
    {{- include "zenith.selectorLabels" . | nindent 4 }}
{{- end }}

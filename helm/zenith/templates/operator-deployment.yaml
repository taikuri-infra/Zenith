{{- if .Values.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zenith.fullname" . }}-operator
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      app: zenith-operator
      {{- include "zenith.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: zenith-operator
        {{- include "zenith.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "zenith.serviceAccountName" . }}
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: HETZNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "zenith.fullname" . }}-secrets
                  key: hetzner-token
          args:
            {{- if .Values.operator.leaderElection }}
            - --leader-elect
            {{- end }}
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zenith.fullname" . }}-operator
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: zenith-operator
    {{- include "zenith.selectorLabels" . | nindent 4 }}
{{- end }}

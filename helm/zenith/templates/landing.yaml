{{- if .Values.landing.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-landing
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-landing" "component" "landing") | nindent 4 }}
spec:
  replicas: {{ .Values.landing.replicas }}
  selector:
    matchLabels:
      app: zenith-landing
  template:
    metadata:
      labels:
        app: zenith-landing
        app.kubernetes.io/name: zenith-landing
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: landing
    spec:
      containers:
        - name: landing
          image: {{ .Values.landing.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.landing.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.landing.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-landing
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-landing" "component" "landing") | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.landing.port }}
      targetPort: {{ .Values.landing.port }}
      protocol: TCP
  selector:
    app: zenith-landing
{{- end }}

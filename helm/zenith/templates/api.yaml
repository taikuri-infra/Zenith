{{- if .Values.api.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-api
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-api" "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: zenith-api
  template:
    metadata:
      labels:
        app: zenith-api
        app.kubernetes.io/name: zenith-api
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.api.metricsPort }}
              protocol: TCP
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: jwt-secret
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: admin-password
            - name: CORS_ORIGINS
              value: {{ .Values.api.env.CORS_ORIGINS | quote }}
            - name: DB_HOST
              value: {{ .Values.api.env.DB_HOST | quote }}
            - name: DB_PORT
              value: {{ .Values.api.env.DB_PORT | quote }}
            - name: DB_USER
              value: {{ .Values.api.env.DB_USER | quote }}
            - name: DB_NAME
              value: {{ .Values.api.env.DB_NAME | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenith-db-credentials
                  key: db-password
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-api
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-api" "component" "api") | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      protocol: TCP
    - name: metrics
      port: {{ .Values.api.metricsPort }}
      targetPort: {{ .Values.api.metricsPort }}
      protocol: TCP
  selector:
    app: zenith-api
{{- end }}

openapi: 3.0.3
info:
  title: Zenith API
  description: |
    Zenith is an open-core Platform-as-a-Service (PaaS) for deploying apps,
    databases, and storage on Kubernetes. This spec covers public, protected,
    admin, webhook, internal, and legacy endpoints.
  version: 1.0.0
  contact:
    name: DoTech
    url: https://freezenith.com
  license:
    name: BSL 1.1
    url: https://github.com/dotechhq/zenith/blob/main/LICENSE
servers:
  - url: https://api.freezenith.com
    description: Production
  - url: http://127.0.0.1:8080
    description: Local development

tags:
  - name: Health
    description: Liveness and readiness probes
  - name: Auth
    description: User authentication (login, register, refresh)
  - name: Apps
    description: Application CRUD (Phase 2)
  - name: Deployments
    description: Deployment history and rollback
  - name: Environment Variables
    description: Per-app environment variable management
  - name: Secrets
    description: Encrypted per-app secrets (requires SECRETS_ENCRYPTION_KEY)
  - name: Databases
    description: Per-app managed databases
  - name: Database Backups
    description: Database backup and restore (Pro+)
  - name: Storage Buckets
    description: S3-compatible object storage per app
  - name: App Auth
    description: Built-in authentication per app
  - name: App Auth (Public)
    description: Public signup/login for app end-users
  - name: Plans
    description: User plan and usage limits
  - name: Custom Domains
    description: Custom domain management (Pro+)
  - name: API Keys
    description: Personal API key management
  - name: Sessions
    description: Active session management
  - name: MFA
    description: Multi-factor authentication (Pro+)
  - name: User Webhooks
    description: Webhook subscriptions for deployment events (Pro+)
  - name: Custom Roles
    description: Role-based access control (Team+)
  - name: IP Whitelist
    description: IP allowlist for API access (Enterprise)
  - name: Compliance
    description: Compliance dashboard
  - name: Branding & DPA
    description: White-label branding and DPA (Enterprise)
  - name: SSO
    description: SAML/OIDC single sign-on (Team+)
  - name: Preview Deployments
    description: PR-based preview environments (Team+)
  - name: SCIM
    description: SCIM 2.0 user provisioning (Enterprise)
  - name: Releases
    description: Versioned image releases
  - name: Build Logs
    description: Build/deploy log streaming
  - name: Events
    description: Real-time deployment event streaming (SSE)
  - name: Backstage
    description: Backstage catalog integration
  - name: Inbound Webhooks
    description: Git provider push webhooks (GitHub, GitLab, Bitbucket)
  - name: Internal
    description: Internal endpoints (metering agent)
  - name: Admin Dashboard
    description: Platform dashboard stats and usage
  - name: Admin Customers
    description: Customer lifecycle management
  - name: Admin Plans
    description: Plan CRUD for admin
  - name: Admin Clusters
    description: CAPI cluster management
  - name: Admin Tenants
    description: Tenant management
  - name: Admin Modules
    description: Platform module management
  - name: Admin Users
    description: SaaS user administration
  - name: Admin Audit
    description: Audit log and export
  - name: Admin Updates
    description: Platform update management
  - name: Admin Infrastructure
    description: Infrastructure overview
  - name: Admin State
    description: Platform state and export
  - name: Admin Settings
    description: Platform settings
  - name: Legacy Projects
    description: CRD-based project management (legacy)
  - name: Legacy Apps
    description: CRD-based app management under projects (legacy)
  - name: Legacy Databases
    description: CRD-based database management under projects (legacy)
  - name: Legacy Storage
    description: CRD-based storage management under projects (legacy)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from /api/v1/auth/login
    InternalSecret:
      type: apiKey
      in: header
      name: X-Internal-Secret
      description: Shared secret for internal metering endpoints
    WebhookSignature:
      type: apiKey
      in: header
      name: X-Hub-Signature-256
      description: HMAC-SHA256 signature for inbound webhooks

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'
    Forbidden:
      description: Forbidden — insufficient role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'

  schemas:
    # ── Common ──
    APIError:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: invalid request body
        detail:
          type: string
      required: [code, message]

    Message:
      type: object
      properties:
        message:
          type: string
      required: [message]

    MessageWithCount:
      type: object
      properties:
        message:
          type: string
        count:
          type: integer

    # ── Auth ──
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required: [email, password]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        name:
          type: string
      required: [email, password, name]

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Seconds until access token expires
          example: 3600

    Role:
      type: string
      enum: [owner, admin, developer, viewer]

    # ── Apps ──
    CreateAppV2Request:
      type: object
      properties:
        name:
          type: string
        repo_url:
          type: string
        branch:
          type: string
      required: [name, repo_url]

    AppV2Response:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        repo_url:
          type: string
        branch:
          type: string
        framework:
          $ref: '#/components/schemas/Framework'
        status:
          $ref: '#/components/schemas/AppStatus'
        subdomain:
          type: string
        url:
          type: string
        port:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AppStatus:
      type: string
      enum: [pending, building, deploying, running, sleeping, failed, stopped]

    Framework:
      type: string
      enum: [nextjs, go, python, django, rails, flask, express, static, dockerfile, unknown]

    AppListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AppV2Response'
        total:
          type: integer

    # ── Deployments ──
    Deployment:
      type: object
      properties:
        id:
          type: string
        app_id:
          type: string
        image_tag:
          type: string
        git_sha:
          type: string
        status:
          $ref: '#/components/schemas/DeploymentStatus'
        build_log:
          type: string
        error:
          type: string
        created_at:
          type: string
          format: date-time

    DeploymentStatus:
      type: string
      enum: [pending, building, deploying, active, superseded, failed]

    # ── Environment Variables ──
    EnvVar:
      type: object
      properties:
        id:
          type: string
        app_id:
          type: string
        key:
          type: string
        value:
          type: string

    SetEnvVarsRequest:
      type: object
      properties:
        vars:
          type: object
          additionalProperties:
            type: string
      required: [vars]

    # ── Secrets ──
    Secret:
      type: object
      properties:
        id:
          type: string
        app_id:
          type: string
        key:
          type: string
        created_at:
          type: string
          format: date-time

    SecretWithValue:
      type: object
      properties:
        id:
          type: string
        app_id:
          type: string
        key:
          type: string
        value:
          type: string
        created_at:
          type: string
          format: date-time

    CreateSecretInput:
      type: object
      properties:
        key:
          type: string
          maxLength: 256
        value:
          type: string
      required: [key, value]

    # ── Databases ──
    CreateDatabaseInput:
      type: object
      properties:
        engine:
          $ref: '#/components/schemas/DatabaseEngine'
        name:
          type: string
      required: [engine]

    DatabaseEngine:
      type: string
      enum: [postgresql, mysql, redis]

    DatabaseStatus:
      type: string
      enum: [provisioning, ready, error, deleting]

    DatabaseInfo:
      type: object
      properties:
        id:
          type: string
        app_id:
          type: string
        name:
          type: string
        engine:
          $ref: '#/components/schemas/DatabaseEngine'
        host:
          type: string
        port:
          type: integer
        db_name:
          type: string
        db_user:
          type: string
        connection_string:
          type: string
        size_mb:
          type: integer
        max_size_mb:
          type: integer
        status:
          $ref: '#/components/schemas/DatabaseStatus'
        created_at:
          type: string

    # ── Database Backups ──
    CreateBackupInput:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/BackupType'

    BackupType:
      type: string
      enum: [manual, scheduled]

    BackupStatus:
      type: string
      enum: [pending, running, completed, failed]

    BackupInfo:
      type: object
      properties:
        id:
          type: string
        database_id:
          type: string
        type:
          $ref: '#/components/schemas/BackupType'
        status:
          $ref: '#/components/schemas/BackupStatus'
        size_mb:
          type: integer
        error:
          type: string
        created_at:
          type: string

    # ── Storage Buckets ──
    CreateBucketInput:
      type: object
      properties:
        name:
          type: string
        access:
          $ref: '#/components/schemas/BucketAccess'
      required: [name]

    BucketAccess:
      type: string
      enum: [private, public]

    BucketStatus:
      type: string
      enum: [creating, active, error, deleting]

    BucketInfo:
      type: object
      properties:
        id:
          type: string
        app_id:
          type: string
        name:
          type: string
        access:
          $ref: '#/components/schemas/BucketAccess'
        region:
          type: string
        size_mb:
          type: integer
        max_size_mb:
          type: integer
        objects:
          type: integer
        status:
          $ref: '#/components/schemas/BucketStatus'
        endpoint:
          type: string
        created_at:
          type: string

    # ── App Auth ──
    AppAuthConfigResponse:
      type: object
      properties:
        enabled:
          type: boolean
        user_count:
          type: integer
        max_users:
          type: integer

    AppAuthSignupInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
      required: [email, password, name]

    AppAuthLoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AppAuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer

    AppAuthUserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        verified:
          type: boolean
        created_at:
          type: string

    # ── Plans ──
    PlanTier:
      type: string
      enum: [free, pro, team, enterprise]

    PlanLimits:
      type: object
      properties:
        max_apps:
          type: integer
        max_databases:
          type: integer
        max_db_size_mb:
          type: integer
        max_auth_users:
          type: integer
        max_storage_mb:
          type: integer
        max_buckets:
          type: integer
        max_cpu_millis:
          type: integer
        max_ram_mb:
          type: integer
        max_team_members:
          type: integer
        backups_enabled:
          type: boolean
        custom_domain:
          type: boolean
        always_on:
          type: boolean
        sleep_after_mins:
          type: integer

    PlanUsage:
      type: object
      properties:
        apps:
          type: integer
        databases:
          type: integer
        storage_mb:
          type: integer
        auth_users:
          type: integer
        buckets:
          type: integer

    UserPlanResponse:
      type: object
      properties:
        tier:
          $ref: '#/components/schemas/PlanTier'
        limits:
          $ref: '#/components/schemas/PlanLimits'
        usage:
          $ref: '#/components/schemas/PlanUsage'

    UpgradePlanRequest:
      type: object
      properties:
        tier:
          $ref: '#/components/schemas/PlanTier'
      required: [tier]

    # ── Custom Domains ──
    AddDomainInput:
      type: object
      properties:
        domain:
          type: string
      required: [domain]

    DomainStatus:
      type: string
      enum: [pending, verified, active, failed]

    DomainInfo:
      type: object
      properties:
        id:
          type: string
        app_id:
          type: string
        domain:
          type: string
        status:
          $ref: '#/components/schemas/DomainStatus'
        tls_ready:
          type: boolean
        created_at:
          type: string

    # ── API Keys ──
    CreateAPIKeyInput:
      type: object
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_in_days:
          type: integer
      required: [name]

    APIKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key_prefix:
          type: string
        key:
          type: string
          description: Full key — only returned on creation
        scopes:
          type: array
          items:
            type: string
        user_id:
          type: string
        project_id:
          type: string
        last_used_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    # ── Sessions ──
    Session:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        ip_address:
          type: string
        user_agent:
          type: string
        device:
          type: string
        current:
          type: boolean
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time

    # ── MFA ──
    MFAStatusResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/MFAStatus'
        enabled_at:
          type: string
          format: date-time

    MFAStatus:
      type: string
      enum: [disabled, pending, enabled]

    MFAEnableResponse:
      type: object
      properties:
        secret:
          type: string
        qr_url:
          type: string
        backup_codes:
          type: array
          items:
            type: string

    MFACodeRequest:
      type: object
      properties:
        code:
          type: string
      required: [code]

    MFABackupCodesResponse:
      type: object
      properties:
        backup_codes:
          type: array
          items:
            type: string

    # ── User Webhooks ──
    CreateUserWebhookInput:
      type: object
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEvent'
        secret:
          type: string
      required: [url, events]

    WebhookEvent:
      type: string
      enum: [deploy.success, deploy.failed, app.sleeping, app.waking, db.created, limit.reached]

    UserWebhook:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEvent'
        secret:
          type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebhookDeliveryStatus:
      type: string
      enum: [pending, success, failed]

    WebhookDelivery:
      type: object
      properties:
        id:
          type: string
        webhook_id:
          type: string
        event:
          $ref: '#/components/schemas/WebhookEvent'
        payload:
          type: string
        status:
          $ref: '#/components/schemas/WebhookDeliveryStatus'
        status_code:
          type: integer
        error:
          type: string
        attempts:
          type: integer
        created_at:
          type: string
          format: date-time

    # ── Custom Roles ──
    Permission:
      type: string
      enum: [deploy, view_logs, manage_db, manage_team, manage_billing, admin]

    CreateRoleInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
      required: [name, permissions]

    CustomRole:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AssignRoleInput:
      type: object
      properties:
        member_id:
          type: string
      required: [member_id]

    RoleAssignment:
      type: object
      properties:
        id:
          type: string
        role_id:
          type: string
        member_id:
          type: string
        assigned_by:
          type: string
        created_at:
          type: string
          format: date-time

    # ── IP Whitelist ──
    AddIPWhitelistInput:
      type: object
      properties:
        cidr:
          type: string
          example: 192.168.1.0/24
        description:
          type: string
      required: [cidr]

    IPWhitelistEntry:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        cidr:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Compliance ──
    ComplianceCheck:
      type: object
      properties:
        category:
          type: string
        item:
          type: string
        status:
          type: string
          enum: [pass, fail, partial, na]
        description:
          type: string

    ComplianceResponse:
      type: object
      properties:
        tier:
          $ref: '#/components/schemas/PlanTier'
        checks:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceCheck'

    # ── Branding & DPA ──
    DPARecord:
      type: object
      properties:
        user_id:
          type: string
        status:
          type: string
          enum: [unsigned, signed]
        signed_by:
          type: string
        signed_at:
          type: string
          format: date-time
        ip_address:
          type: string

    BrandingConfig:
      type: object
      properties:
        user_id:
          type: string
        company_name:
          type: string
        logo_url:
          type: string
        primary_color:
          type: string
          example: "#4F46E5"
        dashboard_domain:
          type: string
        domain_verified:
          type: boolean
        hide_branding:
          type: boolean
        updated_at:
          type: string
          format: date-time

    SetDashboardDomainInput:
      type: object
      properties:
        domain:
          type: string
      required: [domain]

    # ── SSO ──
    SSOProvider:
      type: string
      enum: [saml, oidc]

    ConfigureSAMLInput:
      type: object
      properties:
        entity_id:
          type: string
        sso_url:
          type: string
        certificate:
          type: string
      required: [entity_id, sso_url, certificate]

    ConfigureOIDCInput:
      type: object
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        discovery_url:
          type: string
      required: [client_id, client_secret, discovery_url]

    SSOConfig:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        provider:
          $ref: '#/components/schemas/SSOProvider'
        entity_id:
          type: string
        sso_url:
          type: string
        certificate:
          type: string
        client_id:
          type: string
        discovery_url:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Preview Deployments ──
    CreatePreviewInput:
      type: object
      properties:
        branch:
          type: string
        pr_number:
          type: integer
      required: [branch]

    PreviewDeployment:
      type: object
      properties:
        id:
          type: string
        app_id:
          type: string
        pr_number:
          type: integer
        branch:
          type: string
        url:
          type: string
        status:
          type: string
        git_sha:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── SCIM ──
    SCIMUser:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
        id:
          type: string
        userName:
          type: string
        name:
          type: object
          properties:
            formatted:
              type: string
        emails:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              primary:
                type: boolean
        active:
          type: boolean

    SCIMListResponse:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
        totalResults:
          type: integer
        Resources:
          type: array
          items:
            $ref: '#/components/schemas/SCIMUser'

    SCIMCreateUserInput:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
        userName:
          type: string
        name:
          type: object
          properties:
            formatted:
              type: string
        emails:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              primary:
                type: boolean
        password:
          type: string
      required: [userName, password]

    # ── Releases ──
    CreateReleaseInput:
      type: object
      properties:
        image:
          type: string
        git_sha:
          type: string
        branch:
          type: string
        message:
          type: string
      required: [image]

    Release:
      type: object
      properties:
        id:
          type: string
        app_id:
          type: string
        image:
          type: string
        git_sha:
          type: string
        branch:
          type: string
        message:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Events ──
    DeployEvent:
      type: object
      properties:
        type:
          type: string
        app_id:
          type: string
        app_name:
          type: string
        deployment_id:
          type: string
        status:
          type: string
        image:
          type: string
        message:
          type: string
        timestamp:
          type: string

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
        level:
          type: string
        message:
          type: string

    # ── Inbound Webhooks ──
    GitHubPushEvent:
      type: object
      properties:
        ref:
          type: string
        after:
          type: string
        repository:
          type: object
          properties:
            full_name:
              type: string
            clone_url:
              type: string
        head_commit:
          type: object
          properties:
            id:
              type: string
            message:
              type: string

    # ── Legacy Projects ──
    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
        plan:
          type: string
        region:
          type: string
      required: [name]

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        plan:
          type: string

    ProjectResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        owner:
          type: string
        plan:
          type: string
        region:
          type: string
        phase:
          type: string
        namespace:
          type: string
        app_count:
          type: integer
        db_count:
          type: integer
        created_at:
          type: string
          format: date-time

    # ── Admin: Customers ──
    Customer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          type: string
        planId:
          type: string
        plan:
          $ref: '#/components/schemas/AdminPlan'
        status:
          type: string
        contactEmail:
          type: string
        contactName:
          type: string
        notes:
          type: string
        capiClusterName:
          type: string
        clusterStatus:
          type: string
        clusterNodes:
          type: integer
        clusterRegion:
          type: string
        clusterK8sVersion:
          type: string
        clusterEndpoint:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCustomerInput:
      type: object
      properties:
        name:
          type: string
        domain:
          type: string
        planId:
          type: string
        contactEmail:
          type: string
        contactName:
          type: string
      required: [name, domain, planId, contactEmail, contactName]

    UpdateCustomerInput:
      type: object
      properties:
        name:
          type: string
        domain:
          type: string
        planId:
          type: string
        contactEmail:
          type: string
        contactName:
          type: string
        notes:
          type: string

    CustomerStats:
      type: object
      properties:
        totalCustomers:
          type: integer
        activeCustomers:
          type: integer
        mrr:
          type: string
        newThisMonth:
          type: integer

    ScaleClusterInput:
      type: object
      properties:
        nodes:
          type: integer
      required: [nodes]

    # ── Admin: Plans ──
    AdminPlan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        cpuCores:
          type: integer
        ramGb:
          type: integer
        s3Tb:
          type: integer
        dbStorageGb:
          type: integer
        volumeGb:
          type: integer
        lbCount:
          type: integer
        storageGb:
          type: integer
        s3StorageTb:
          type: integer
        loadBalancer:
          type: integer
        priceCents:
          type: integer
        currency:
          type: string
        billingCycle:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePlanInput:
      type: object
      properties:
        name:
          type: string
        cpuCores:
          type: integer
        ramGb:
          type: integer
        s3Tb:
          type: integer
        dbStorageGb:
          type: integer
        volumeGb:
          type: integer
        lbCount:
          type: integer
        storageGb:
          type: integer
        s3StorageTb:
          type: integer
        loadBalancer:
          type: integer
        priceCents:
          type: integer
        currency:
          type: string
        billingCycle:
          type: string
      required: [name]

    UpdatePlanInput:
      type: object
      properties:
        name:
          type: string
        cpuCores:
          type: integer
        ramGb:
          type: integer
        s3Tb:
          type: integer
        dbStorageGb:
          type: integer
        volumeGb:
          type: integer
        lbCount:
          type: integer
        storageGb:
          type: integer
        s3StorageTb:
          type: integer
        loadBalancer:
          type: integer
        priceCents:
          type: integer
        currency:
          type: string
        billingCycle:
          type: string
        active:
          type: boolean

    # ── Admin: Clusters ──
    AdminCluster:
      type: object
      properties:
        name:
          type: string
        k8sVersion:
          type: string
        nodes:
          type: integer
        region:
          type: string
        type:
          type: string
        tenant:
          type: string
        cpuPercent:
          type: integer
        ramPercent:
          type: integer
        pods:
          $ref: '#/components/schemas/ResourcePair'
        pvcs:
          $ref: '#/components/schemas/ResourcePair'
        status:
          type: string
        upgradeAvailable:
          type: string

    ResourcePair:
      type: object
      properties:
        used:
          type: integer
        total:
          type: integer

    CreateClusterInput:
      type: object
      properties:
        name:
          type: string
        region:
          type: string
        type:
          type: string
          enum: [shared, dedicated]
        tenant:
          type: string
        nodes:
          type: integer
        k8sVersion:
          type: string
      required: [name, region, k8sVersion]

    UpgradeClusterInput:
      type: object
      properties:
        version:
          type: string
      required: [version]

    # ── Admin: Tenants ──
    Tenant:
      type: object
      properties:
        name:
          type: string
        plan:
          type: string
        apps:
          type: integer
        databases:
          type: integer
        cpuUsed:
          type: string
        cpuLimit:
          type: string
        ramUsed:
          type: string
        ramLimit:
          type: string
        status:
          type: string

    # ── Admin: Modules ──
    Module:
      type: object
      properties:
        name:
          type: string
        installed:
          type: string
        latest:
          type: string
        status:
          type: string
        description:
          type: string

    # ── Admin: Audit ──
    AuditEntry:
      type: object
      properties:
        time:
          type: string
        actor:
          type: string
        action:
          type: string
        cluster:
          type: string

    # ── Admin: Updates ──
    PlatformUpdate:
      type: object
      properties:
        version:
          type: string
        current:
          type: string
        releasedAt:
          type: string
        features:
          type: array
          items:
            type: string
        breakingChanges:
          type: boolean

    UpdateHistoryEntry:
      type: object
      properties:
        version:
          type: string
        date:
          type: string
        status:
          type: string

    ApplyUpdateInput:
      type: object
      properties:
        version:
          type: string
      required: [version]

    # ── Admin: Infrastructure ──
    InfraOverview:
      type: object
      properties:
        servers:
          type: integer
        volumes:
          type: integer
        volumeSize:
          type: string
        loadBalancers:
          type: integer
        lbPublic:
          type: integer
        lbInternal:
          type: integer
        monthlyCost:
          type: string
        resources:
          type: array
          items:
            $ref: '#/components/schemas/InfraNode'

    InfraNode:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        count:
          type: integer
        cluster:
          type: string
        monthlyCost:
          type: string

    # ── Admin: Platform State ──
    PlatformState:
      type: object
      properties:
        platformVersion:
          type: string
        updateAvailable:
          type: string
        installedDate:
          type: string
        installedDaysAgo:
          type: integer
        managementK8sVersion:
          type: string
        managementK8sUpToDate:
          type: boolean
        domain:
          type: string
        wildcardTls:
          type: boolean

    # ── Admin: Settings ──
    PlatformSettings:
      type: object
      properties:
        platformName:
          type: string
        baseDomain:
          type: string
        provider:
          type: string
        defaultRegion:
          type: string
        regionLabel:
          type: string
        autoBackups:
          type: boolean
        retentionDays:
          type: integer

    # ── Admin: Dashboard ──
    DashboardStats:
      type: object
      properties:
        clusterCount:
          type: integer
        allHealthy:
          type: boolean
        tenantCount:
          type: integer
        activeToday:
          type: integer
        monthlyCost:
          type: string
        costProvider:
          type: string
        updatesAvailable:
          type: integer

    # ── Admin: Metering ──
    MeteringInput:
      type: object
      properties:
        customerId:
          type: string
        cpuCores:
          type: number
        ramGb:
          type: number
        s3Tb:
          type: number
        dbStorageGb:
          type: number
        volumeGb:
          type: number
        lbCount:
          type: integer
      required: [customerId]

    CustomerUsage:
      type: object
      properties:
        cpuCores:
          type: number
        cpuCeiling:
          type: integer
        cpuPercent:
          type: number
        ramGb:
          type: number
        ramCeiling:
          type: integer
        ramPercent:
          type: number
        s3Tb:
          type: number
        s3Ceiling:
          type: integer
        s3Percent:
          type: number
        dbStorageGb:
          type: number
        dbCeiling:
          type: integer
        dbPercent:
          type: number
        volumeGb:
          type: number
        volCeiling:
          type: integer
        volPercent:
          type: number
        lbCount:
          type: integer
        lbCeiling:
          type: integer
        lbPercent:
          type: number
        recordedAt:
          type: string
          format: date-time

    UsageHistoryEntry:
      type: object
      properties:
        date:
          type: string
        cpuAvg:
          type: number
        cpuMax:
          type: number
        ramAvg:
          type: number
        ramMax:
          type: number
        dbStorageGb:
          type: number
        volumeGb:
          type: number
        lbCount:
          type: integer

    PlatformUsageSummary:
      type: object
      properties:
        totalCpu:
          type: number
        totalRam:
          type: number
        totalStorage:
          type: number
        customersReporting:
          type: integer

    # ── Admin: Users ──
    AdminUserInfo:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        tier:
          $ref: '#/components/schemas/PlanTier'
        usage:
          $ref: '#/components/schemas/PlanUsage'

    SetUserPlanInput:
      type: object
      properties:
        tier:
          type: string
      required: [tier]

    # ── Health ──
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
        buildTime:
          type: string
        gitCommit:
          type: string

    VersionResponse:
      type: object
      properties:
        version:
          type: string
        buildTime:
          type: string
        gitCommit:
          type: string

paths:
  # ════════════════════════════════════════
  # Health
  # ════════════════════════════════════════
  /health:
    get:
      operationId: healthCheck
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /ready:
    get:
      operationId: readinessCheck
      tags: [Health]
      summary: Readiness probe (checks DB connection)
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '503':
          description: Not ready
        '400':
          $ref: '#/components/responses/BadRequest'

  # ════════════════════════════════════════
  # Version & Auth
  # ════════════════════════════════════════
  /api/v1/version:
    get:
      operationId: getVersion
      tags: [Health]
      summary: API version info
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Authenticate user and get JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/register:
    post:
      operationId: register
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: User created and tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ════════════════════════════════════════
  # Apps (Phase 2)
  # ════════════════════════════════════════
  /api/v1/apps:
    post:
      operationId: createApp
      tags: [Apps]
      summary: Create a new app
      security: [{BearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppV2Request'
      responses:
        '201':
          description: App created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppV2Response'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      operationId: listApps
      tags: [Apps]
      summary: List all apps for the authenticated user
      security: [{BearerAuth: []}]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/apps/{appId}:
    get:
      operationId: getApp
      tags: [Apps]
      summary: Get app by ID
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppV2Response'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteApp
      tags: [Apps]
      summary: Delete an app
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: App deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════
  # Deployments
  # ════════════════════════════════════════
  /api/v1/apps/{appId}/deployments:
    get:
      operationId: listDeployments
      tags: [Deployments]
      summary: List deployments for an app
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deployment'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/apps/{appId}/deployments/{deployId}:
    get:
      operationId: getDeployment
      tags: [Deployments]
      summary: Get a specific deployment
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: deployId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/apps/{appId}/rollback:
    post:
      operationId: rollbackApp
      tags: [Deployments]
      summary: Rollback to the previous deployment
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rollback initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════
  # Environment Variables
  # ════════════════════════════════════════
  /api/v1/apps/{appId}/env:
    put:
      operationId: setEnvVars
      tags: [Environment Variables]
      summary: Set environment variables for an app
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetEnvVarsRequest'
      responses:
        '200':
          description: Environment variables updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnvVar'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      operationId: getEnvVars
      tags: [Environment Variables]
      summary: Get environment variables for an app
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnvVar'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/apps/{appId}/env/{key}:
    delete:
      operationId: deleteEnvVar
      tags: [Environment Variables]
      summary: Delete an environment variable
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════
  # Secrets
  # ════════════════════════════════════════
  /api/v1/apps/{appId}/secrets:
    get:
      operationId: listSecrets
      tags: [Secrets]
      summary: List secrets (keys only, no values)
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Secret'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: setSecret
      tags: [Secrets]
      summary: Create or update a secret
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSecretInput'
      responses:
        '200':
          description: Secret set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Secret'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/apps/{appId}/secrets/{key}/value:
    get:
      operationId: getSecretValue
      tags: [Secrets]
      summary: Get decrypted secret value
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretWithValue'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/apps/{appId}/secrets/{key}:
    delete:
      operationId: deleteSecret
      tags: [Secrets]
      summary: Delete a secret
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════
  # Databases
  # ════════════════════════════════════════
  /api/v1/apps/{appId}/databases:
    post:
      operationId: createDatabase
      tags: [Databases]
      summary: Provision a database for an app
      security: [{BearerAuth: []}]
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatabaseInput'
      responses:
        '201':
          description: Database created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      operationId: listDatabases
      tags: [Databases]
      summary: List databases for an app
      security: [{BearerAuth: []}]

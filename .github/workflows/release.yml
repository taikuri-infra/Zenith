name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # =========================================================================
  # Step 1: Release Please — creates/updates Release PR or creates a release
  # =========================================================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  # =========================================================================
  # Step 2: Build & push all Docker images (only when a release is created)
  # =========================================================================
  build-and-push:
    name: Build & Push Images
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/build-images.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
    secrets: inherit

  # =========================================================================
  # Step 3: Update staging branch so ArgoCD auto-syncs
  # =========================================================================
  update-staging:
    name: Update Staging
    needs: [release-please, build-and-push]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into staging
        run: git merge origin/main --no-edit

      - name: Update image tags in all values-staging.yaml
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          # Update all zenith-* image tags across every values-staging.yaml
          find infra/helm -name "values-staging.yaml" -exec \
            sed -i "s|\(image: zenith-[^:]*:\)[0-9][0-9.]*|\1${VERSION}|g" {} +
          echo "Updated image tags to ${VERSION}:"
          grep -r "image: zenith-" infra/helm/*/values-staging.yaml || true

      - name: Commit and push staging
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: bump staging images to v${VERSION}"
          git push origin staging

name: Security Analysis

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'services/**'
      - 'packages/**'
      - 'infra/helm/**'
      - 'infra/terraform/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --config .semgrep.yml --error --json -o semgrep-results.json .
        env:
          SEMGREP_RULES: >-
            p/default
            p/golang
            p/typescript
            p/nextjs
            p/terraform
            p/docker
            p/kubernetes
            p/secrets
            p/owasp-top-ten

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30

      - name: Summary
        if: always()
        run: semgrep scan --config auto --config .semgrep.yml --error .

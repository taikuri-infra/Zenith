name: Build & Push Public Self-Host Images

# Publishes the self-hostable FreeZenith images to the PUBLIC GitHub Container
# Registry (ghcr.io) so anyone can `docker compose up` without registry auth.
# This is separate from build-images.yml, which pushes to the private Harbor
# for the SaaS/staging cluster. Self-hosters pull from GHCR; the SaaS cluster
# pulls from Harbor.
#
# Dormant by design: runs only on manual dispatch or a published release —
# committing this file does not push anything.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 0.9.0 or latest). Also always pushes :latest.'
        required: true
        default: 'latest'
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: zenith-api
            dockerfile: services/api/Dockerfile
            build_args: ""
          - image: zenith-web
            dockerfile: apps/web/Dockerfile
            # Self-host defaults; the web entrypoint.sh overrides NEXT_PUBLIC_*
            # at runtime, so these are only fallbacks.
            build_args: |
              NEXT_PUBLIC_ZENITH_MODE=standalone
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          else
            TAG="$INPUT_TAG"
          fi
          # Strip a leading v (v0.9.0 -> 0.9.0)
          TAG="${TAG#v}"
          # Validate: allow only semver-ish tags or 'latest' — reject anything else
          if ! printf '%s' "$TAG" | grep -qE '^([0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z]+)*|latest)$'; then
            echo "Refusing unsafe/unexpected tag: '$TAG'" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Build & Push Docker Images

on:
  # Called by release.yml after Release Please creates a release
  workflow_call:
    inputs:
      version:
        description: 'Version to tag images with'
        required: true
        type: string

  # Manual trigger (kept for emergency/manual builds)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.8.0). Defaults to Chart.yaml appVersion.'
        required: false

env:
  REGISTRY: ${{ secrets.HARBOR_HOST }}
  PROJECT: zenith-stage

jobs:
  # =========================================================================
  # Prepare: determine version + SHA
  # =========================================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_short: ${{ steps.version.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep 'appVersion' infra/helm/zenith/Chart.yaml | awk '{print $2}' | tr -d '"')
          fi
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION} (sha: ${SHA_SHORT})"

  # =========================================================================
  # Build & Push: API
  # =========================================================================
  build-api:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Build & push zenith-api
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/zenith-api:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/zenith-api:sha-${{ needs.prepare.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/zenith-api:latest

      - name: Install cosign
        if: env.COSIGN_PRIVATE_KEY != ''
        uses: sigstore/cosign-installer@v3
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}

      - name: Sign zenith-api image
        if: env.COSIGN_PRIVATE_KEY != ''
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/zenith-api@${{ steps.build.outputs.digest }}

      - name: Scan zenith-api with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT }}/zenith-api:${{ needs.prepare.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # =========================================================================
  # Build & Push: Landing
  # =========================================================================
  build-landing:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Build & push zenith-landing
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/landing/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_APP_URL=https://app.stage.freezenith.com
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/zenith-landing:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/zenith-landing:sha-${{ needs.prepare.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/zenith-landing:latest

      - name: Install cosign
        if: env.COSIGN_PRIVATE_KEY != ''
        uses: sigstore/cosign-installer@v3
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}

      - name: Sign zenith-landing image
        if: env.COSIGN_PRIVATE_KEY != ''
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/zenith-landing@${{ steps.build.outputs.digest }}

  # =========================================================================
  # Build & Push: Mission Control + Demo
  # =========================================================================
  build-mc:
    needs: prepare
    runs-on: ubuntu-latest
    steps:

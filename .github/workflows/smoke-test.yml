name: Smoke Tests

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API URL to test against'
        required: false
        default: 'https://api.stage.freezenith.com'

  # Run after successful release or manual image build
  workflow_run:
    workflows: ["Release", "Build & Push Docker Images"]
    types: [completed]
    branches: [main, staging]

  # Scheduled: every 6 hours
  schedule:
    - cron: '0 */6 * * *'

env:
  API_URL: ${{ github.event.inputs.api_url || 'https://api.stage.freezenith.com' }}

jobs:
  customer-smoke-test:
    name: Customer Userflow
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Run customer smoke test
        env:
          ZENITH_API_URL: ${{ env.API_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: ./infra/scripts/smoke-test-customer.sh --verbose

  owner-smoke-test:
    name: Owner Userflow (Admin)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Run owner smoke test
        env:
          ZENITH_API_URL: ${{ env.API_URL }}
          ADMIN_EMAIL: ${{ secrets.STAGING_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
        run: ./infra/scripts/smoke-test-owner.sh --verbose

  infrastructure-e2e:
    name: Infrastructure E2E
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Run infrastructure E2E test
        run: ./infra/scripts/e2e-test-staging.sh --verbose

  notify:
    name: DR Test Report
    runs-on: ubuntu-latest
    if: always()
    needs: [customer-smoke-test, owner-smoke-test, infrastructure-e2e]
    steps:
      - name: Determine overall status
        id: status
        run: |
          CUSTOMER="${{ needs.customer-smoke-test.result }}"
          OWNER="${{ needs.owner-smoke-test.result }}"
          INFRA="${{ needs.infrastructure-e2e.result }}"

          if [ "$CUSTOMER" = "success" ] && [ "$OWNER" = "success" ] && [ "$INFRA" = "success" ]; then
            echo "overall=success" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "color=good" >> "$GITHUB_OUTPUT"
            echo "text=All DR smoke tests passed" >> "$GITHUB_OUTPUT"
          else
            echo "overall=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=🚨" >> "$GITHUB_OUTPUT"
            echo "color=danger" >> "$GITHUB_OUTPUT"
            echo "text=DR smoke test failures detected" >> "$GITHUB_OUTPUT"
          fi

          echo "customer=$CUSTOMER" >> "$GITHUB_OUTPUT"
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "infra=$INFRA" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS_EMOJI: ${{ steps.status.outputs.emoji }}
          STATUS_COLOR: ${{ steps.status.outputs.color }}
          STATUS_CUSTOMER: ${{ steps.status.outputs.customer }}
          STATUS_OWNER: ${{ steps.status.outputs.owner }}
          STATUS_INFRA: ${{ steps.status.outputs.infra }}
          TARGET_URL: ${{ env.API_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGER: ${{ github.event_name }}
        run: |
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "❓";; esac; }
          PAYLOAD=$(jq -n \
            --arg color "$STATUS_COLOR" \
            --arg title "$STATUS_EMOJI Zenith DR Smoke Test Report" \
            --arg customer "$(icon "$STATUS_CUSTOMER") $STATUS_CUSTOMER" \
            --arg owner "$(icon "$STATUS_OWNER") $STATUS_OWNER" \
            --arg infra "$(icon "$STATUS_INFRA") $STATUS_INFRA" \
            --arg target "$TARGET_URL" \
            --arg ctx "<${RUN_URL}|View Run> | Trigger: ${TRIGGER} | $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{attachments:[{color:$color,blocks:[
              {type:"header",text:{type:"plain_text",text:$title}},
              {type:"section",fields:[
                {type:"mrkdwn",text:("*Customer:*\n"+$customer)},
                {type:"mrkdwn",text:("*Owner:*\n"+$owner)},
                {type:"mrkdwn",text:("*Infra E2E:*\n"+$infra)},
                {type:"mrkdwn",text:("*Target:*\n"+$target)}
              ]},
              {type:"context",elements:[{type:"mrkdwn",text:$ctx}]}
            ]}]}')
          curl -sS -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "$PAYLOAD"

      - name: Send Telegram notification
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS_EMOJI: ${{ steps.status.outputs.emoji }}
          STATUS_CUSTOMER: ${{ steps.status.outputs.customer }}
          STATUS_OWNER: ${{ steps.status.outputs.owner }}
          STATUS_INFRA: ${{ steps.status.outputs.infra }}
          TARGET_URL: ${{ env.API_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGER: ${{ github.event_name }}
        run: |
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "❓";; esac; }
          MSG="${STATUS_EMOJI} *Zenith DR Smoke Test Report*

          $(icon "$STATUS_CUSTOMER") Customer Userflow: ${STATUS_CUSTOMER}
          $(icon "$STATUS_OWNER") Owner Userflow: ${STATUS_OWNER}
          $(icon "$STATUS_INFRA") Infrastructure E2E: ${STATUS_INFRA}

          Target: \`${TARGET_URL}\`
          Trigger: ${TRIGGER}
          [View Run](${RUN_URL})"

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=Markdown \
            -d text="${MSG}"

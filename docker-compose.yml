services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zenith
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zenith}
      POSTGRES_DB: zenith
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Not published to the host — only the API reaches it over the compose
    # network. Exposing 5432 publicly would put the database on the internet.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenith"]
      interval: 5s
      timeout: 3s
      retries: 5

  storage:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    user: "10001:10001"
    command: ["/data"]
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-zenith}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-changeme123}
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
    volumes:
      - storagedata:/data
    # S3 API (9000) and console (9001) are reached only by the API over the
    # compose network — not published to the host (would expose object storage
    # publicly). Uncomment to reach the console locally:
    #   ports: ["127.0.0.1:9001:9001"]

  # One-shot job: creates the platform bucket on first boot.
  # RustFS (like MinIO) doesn't auto-create buckets, so `mc` does it here.
  storage-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - storage
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-zenith}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-changeme123}
      S3_PLATFORM_BUCKET: ${S3_PLATFORM_BUCKET:-zenith-platform-storage}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://storage:9000 \"$$S3_ACCESS_KEY\" \"$$S3_SECRET_KEY\"; do sleep 2; done;
      mc mb -p local/$$S3_PLATFORM_BUCKET;
      exit 0
      "

  # Prebuilt public image (no build needed). To build from source instead,
  # replace the `image:` line with:
  #   build: { context: ., dockerfile: services/api/Dockerfile }
  api:
    image: ghcr.io/taikuri-infra/zenith-api:${ZENITH_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      ZENITH_MODE: standalone
      DATABASE_URL: postgres://zenith:${DB_PASSWORD:-zenith}@postgres:5432/zenith?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Apps are subdomains of this (whoami.<BASE_DOMAIN>). Defaults to the
      # dashboard domain; use "localhost" locally (apps get *.localhost; no DNS
      # or public certificate needed for local testing).
      BASE_DOMAIN: ${ZENITH_DOMAIN:-localhost}
      # Self-host deploys a whole multi-service app at once; allow enough
      # concurrent deploys for that.
      MAX_CONCURRENT_DEPLOYS: ${MAX_CONCURRENT_DEPLOYS:-10}
      ENVIRONMENT: production
      S3_ENDPOINT: http://storage:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-zenith}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-changeme123}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PLATFORM_BUCKET: ${S3_PLATFORM_BUCKET:-zenith-platform-storage}
      ZENITH_APP_NETWORK: zenith_default
    # The API deploys user apps as Docker containers on the host (standalone
    # mode), so it needs the Docker socket. It runs as a non-root user, so add
    # the host's docker group GID (install.sh detects it; default 999).
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Routed by Traefik under the `tls` profile: <domain>/api/* -> this service.
    # Inert when Traefik isn't running (default profile uses the published port).
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zenith-api.rule=Host(`${ZENITH_DOMAIN:-localhost}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.zenith-api.entrypoints=websecure"
      - "traefik.http.routers.zenith-api.tls.certresolver=le"
      - "traefik.http.routers.zenith-api.priority=100"
      - "traefik.http.services.zenith-api.loadbalancer.server.port=8080"

  # Prebuilt public image. The dashboard reads NEXT_PUBLIC_* at runtime (see
  # apps/web/entrypoint.sh), so these are set as env, not build args. To build
  # from source instead, replace `image:` with:
  #   build: { context: ., dockerfile: apps/web/Dockerfile }
  web:
    image: ghcr.io/taikuri-infra/zenith-web:${ZENITH_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_ZENITH_MODE: standalone
    # Routed by Traefik under the `tls` profile: <domain>/ -> dashboard.
    # Lower priority than the API router so /api/* wins.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zenith-web.rule=Host(`${ZENITH_DOMAIN:-localhost}`)"
      - "traefik.http.routers.zenith-web.entrypoints=websecure"
      - "traefik.http.routers.zenith-web.tls.certresolver=le"
      - "traefik.http.routers.zenith-web.priority=1"
      - "traefik.http.services.zenith-web.loadbalancer.server.port=3000"

  # Production reverse proxy with automatic HTTPS (Let's Encrypt).
  # Only starts with the `tls` profile:  docker compose --profile tls up -d
  # Requires ZENITH_DOMAIN (and ideally ACME_EMAIL) set in .env, DNS pointing
  # at this server, and ports 80/443 open.
  # Traefik watches the Docker socket and auto-routes any container carrying
  # traefik.* labels — this is how deployed user apps get their
  # <subdomain>.<domain> route + Let's Encrypt cert with no config changes. It's
  # the same proxy the cloud/k8s edition uses (Traefik IngressRoute), so both
  # editions share one routing model. The dashboard + API are routed by the
  # traefik.* labels on the web/api services above.
  traefik:
    # v3.7+ negotiates the Docker API version via an unversioned ping; older
    # tags default to API 1.24, which Docker 25+ daemons reject outright.
    image: traefik:v3.7.8
    restart: unless-stopped
    profiles: ["tls"]
    depends_on:
      - web
      - api
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=zenith_default"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect all plain HTTP to HTTPS.
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt via HTTP-01 challenge. Set ACME_EMAIL in .env.
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt

networks:
  default:
    name: zenith_default

volumes:
  pgdata:
  storagedata:
  traefik_letsencrypt:

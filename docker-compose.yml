services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zenith
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zenith}
      POSTGRES_DB: zenith
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenith"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ZENITH_MODE: standalone
      DATABASE_URL: postgres://zenith:${DB_PASSWORD:-zenith}@postgres:5432/zenith?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      CORS_ORIGINS: http://localhost:3000
      ENVIRONMENT: production

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_ZENITH_MODE: standalone
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

  # Uncomment for production with TLS:

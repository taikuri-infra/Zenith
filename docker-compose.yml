services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zenith
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zenith}
      POSTGRES_DB: zenith
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenith"]
      interval: 5s
      timeout: 3s
      retries: 5

  storage:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    user: "10001:10001"
    command: ["/data"]
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-zenith}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-changeme123}
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
    volumes:
      - storagedata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # One-shot job: creates the platform bucket on first boot.
  # RustFS (like MinIO) doesn't auto-create buckets, so `mc` does it here.
  storage-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - storage
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-zenith}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-changeme123}
      S3_PLATFORM_BUCKET: ${S3_PLATFORM_BUCKET:-zenith-platform-storage}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://storage:9000 \"$$S3_ACCESS_KEY\" \"$$S3_SECRET_KEY\"; do sleep 2; done;
      mc mb -p local/$$S3_PLATFORM_BUCKET;
      exit 0
      "

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      ZENITH_MODE: standalone
      DATABASE_URL: postgres://zenith:${DB_PASSWORD:-zenith}@postgres:5432/zenith?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      CORS_ORIGINS: http://localhost:3000
      ENVIRONMENT: production
      S3_ENDPOINT: http://storage:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-zenith}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-changeme123}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PLATFORM_BUCKET: ${S3_PLATFORM_BUCKET:-zenith-platform-storage}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_ZENITH_MODE: standalone
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

  # Uncomment for production with TLS:
  # traefik:
  #   image: traefik:v3.1
  #   restart: unless-stopped
  #   command:
  #     - "--providers.docker=true"
  #     - "--entrypoints.web.address=:80"
  #     - "--entrypoints.websecure.address=:443"
  #     - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
  #     - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
  #     - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     - letsencrypt:/letsencrypt

volumes:
  pgdata:
  storagedata:

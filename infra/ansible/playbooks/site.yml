---
# site.yml — Full Zenith deployment (infrastructure + applications)
#
# Usage:
#   ansible-playbook playbooks/site.yml -i inventory/production.yml
#   ansible-playbook playbooks/site.yml -i inventory/staging.yml
#   ansible-playbook playbooks/site.yml -i inventory/production.yml --tags build,deploy
#
# Tags:
#   common, k3s, cert-manager, traefik, infra, postgres, keda, monitoring, dns
#   build, import, deploy, namespaces, secrets, api, landing, mc, web, ingress, tls
#   demo, customers, restart

- name: Deploy Zenith Platform
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: Display deployment info
      ansible.builtin.debug:
        msg: |
          Deploying Zenith to {{ env_name }}
          Host: {{ ansible_host }}
          Domain: {{ base_domain }}
          Namespace: {{ platform_namespace }}
          Tenants: {{ customer_tenants | map(attribute='name') | list }}
      tags: [always]

  roles:
    # --- Infrastructure ---
    - role: common
      tags: [common, infra]

    - role: k3s
      tags: [k3s, infra]

    - role: cilium
      when: enable_cilium | default(false)
      tags: [cilium, infra]

    - role: cert-manager
      tags: [cert-manager, infra]

  post_tasks:
    - name: Show deployment summary
      ansible.builtin.debug:
        msg: |
          =============================================
            Zenith {{ env_name }} base infra deployed!
          =============================================
          Phase 2 Complete. Proceed to Phase 3 (Terraform).
      tags: [always]

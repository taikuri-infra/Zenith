---
# roles/cilium — Install Cilium CNI for NetworkPolicy support
#
# Requires k3s installed with: --flannel-backend=none --disable-network-policy
# Cilium replaces Flannel as the CNI and provides L3/L4/L7 network policies.

- name: Check if Cilium CLI is installed
  ansible.builtin.stat:
    path: /usr/local/bin/cilium
  register: cilium_cli
  tags: [cilium, infra]

- name: Install Cilium CLI
  when: not cilium_cli.stat.exists
  ansible.builtin.shell: |
    CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
    GOOS=linux GOARCH=amd64
    curl -L --fail --remote-name-all \
      https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-${GOOS}-${GOARCH}.tar.gz{,.sha256sum}
    sha256sum --check cilium-${GOOS}-${GOARCH}.tar.gz.sha256sum
    tar xzvfC cilium-${GOOS}-${GOARCH}.tar.gz /usr/local/bin
    rm cilium-${GOOS}-${GOARCH}.tar.gz{,.sha256sum}
  args:
    creates: /usr/local/bin/cilium
  tags: [cilium, infra]

- name: Check if Cilium is installed in cluster
  ansible.builtin.command: >
    k3s kubectl get daemonset cilium -n kube-system
  register: cilium_ds
  failed_when: false
  changed_when: false
  tags: [cilium, infra]

- name: Install Cilium with WireGuard encryption and Hubble
  when: cilium_ds.rc != 0
  ansible.builtin.command: >
    cilium install
    --version {{ cilium_version }}
    --set kubeProxyReplacement=true
    --set k8sServiceHost=127.0.0.1
    --set k8sServicePort=6443
    --set hubble.enabled={{ enable_hubble | default(true) }}
    --set hubble.relay.enabled={{ enable_hubble | default(true) }}
    --set hubble.ui.enabled={{ enable_hubble_ui | default(true) }}
    --set encryption.enabled={{ enable_wireguard | default(true) }}
    --set encryption.type=wireguard
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  tags: [cilium, infra]

- name: Wait for Cilium to be ready
  ansible.builtin.command: cilium status --wait
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: cilium_status
  retries: 12
  delay: 10
  until: cilium_status.rc == 0
  changed_when: false
  tags: [cilium, infra]

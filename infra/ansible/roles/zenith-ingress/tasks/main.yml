---
# roles/zenith-ingress — TLS certificates + IngressRoutes

# =============================================
# TLS Certificates
# =============================================

- name: Create platform TLS certificate
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "{{ platform_tls_secret }}"
        namespace: "{{ platform_namespace }}"
      spec:
        secretName: "{{ platform_tls_secret }}"
        issuerRef:
          name: letsencrypt-prod
          kind: ClusterIssuer
        dnsNames: "{{ platform_tls_domains }}"
  tags: [deploy, ingress, tls]

- name: Create customer TLS certificates
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "{{ item.tls_secret }}"
        namespace: "{{ item.namespace }}"
      spec:
        secretName: "{{ item.tls_secret }}"
        issuerRef:
          name: letsencrypt-prod
          kind: ClusterIssuer
        dnsNames:
          - "{{ item.mc_domain }}"
          - "{{ item.web_domain }}"
  loop: "{{ customer_tenants }}"
  tags: [deploy, ingress, tls]

# =============================================
# Platform IngressRoutes
# =============================================

# --- Landing ---
- name: IngressRoute — landing (HTTPS)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "{{ env_name }}-landing"
        namespace: "{{ platform_namespace }}"
      spec:
        entryPoints: [websecure]
        routes:
          - match: "Host({% for d in landing_domains %}`{{ d }}`{{ ' || Host(' if not loop.last else '' }}{% endfor %})"
            kind: Rule
            services:
              - name: zenith-landing
                port: "{{ landing_port }}"
        tls:
          secretName: "{{ platform_tls_secret }}"
  tags: [deploy, ingress]

- name: IngressRoute — landing (HTTP redirect)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "{{ env_name }}-landing-redirect"
        namespace: "{{ platform_namespace }}"
      spec:
        entryPoints: [web]
        routes:
          - match: "Host({% for d in landing_domains %}`{{ d }}`{{ ' || Host(' if not loop.last else '' }}{% endfor %})"
            kind: Rule
            services:
              - name: zenith-landing
                port: "{{ landing_port }}"
            middlewares:
              - name: redirect-to-https
  tags: [deploy, ingress]

# --- API ---
- name: IngressRoute — API (HTTPS)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "{{ env_name }}-api"
        namespace: "{{ platform_namespace }}"
      spec:
        entryPoints: [websecure]
        routes:
          - match: "Host(`{{ api_domain }}`)"
            kind: Rule
            services:
              - name: zenith-api
                port: "{{ api_port }}"
        tls:
          secretName: "{{ platform_tls_secret }}"
  tags: [deploy, ingress]

- name: IngressRoute — API (HTTP redirect)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "{{ env_name }}-api-redirect"
        namespace: "{{ platform_namespace }}"
      spec:
        entryPoints: [web]
        routes:
          - match: "Host(`{{ api_domain }}`)"
            kind: Rule
            services:
              - name: zenith-api
                port: "{{ api_port }}"
            middlewares:
              - name: redirect-to-https
  tags: [deploy, ingress]

# --- Demo MC ---

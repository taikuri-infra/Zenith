---
# roles/k3s — Install or verify k3s

- name: Check if k3s is installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary
  tags: [k3s, infra]

- name: Install k3s (with Cilium CNI)
  when: not k3s_binary.stat.exists and (enable_cilium | default(false))
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" INSTALL_K3S_EXEC="--flannel-backend=none --disable-network-policy --disable=servicelb" sh -
  args:
    creates: /usr/local/bin/k3s
  tags: [k3s, infra]

- name: Install k3s (default Flannel)
  when: not k3s_binary.stat.exists and not (enable_cilium | default(false))
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -
  args:
    creates: /usr/local/bin/k3s
  tags: [k3s, infra]

- name: Wait for k3s to be ready
  ansible.builtin.command: k3s kubectl get node
  register: k3s_ready
  retries: 30
  delay: 5
  until: k3s_ready.rc == 0
  changed_when: false
  tags: [k3s, infra]

- name: Ensure kubeconfig is accessible
  ansible.builtin.file:
    path: "{{ kubeconfig_path }}"
    mode: "0644"
  tags: [k3s, infra]

- name: Set KUBECONFIG environment variable
  ansible.builtin.lineinfile:
    path: /etc/environment
    line: "KUBECONFIG={{ kubeconfig_path }}"
    regexp: "^KUBECONFIG="
  tags: [k3s, infra]

- name: Create kubectl alias
  ansible.builtin.lineinfile:
    path: /root/.bashrc
    line: "alias kubectl='k3s kubectl'"
    regexp: "^alias kubectl="
  tags: [k3s, infra]

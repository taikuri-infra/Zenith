# Zenith Monitoring Stack Configuration
# This file configures Prometheus, Grafana, Loki, and Promtail

# -- Global settings
global:
  zenith:
    # Platform domain for ingress (set to enable monitoring IngressRoutes)
    domain: ""
    # Platform namespace (for cross-namespace middleware references)
    platformNamespace: ""
    # Enable multi-tenant log separation
    multiTenant: true

# -- Prometheus + Grafana (kube-prometheus-stack)
prometheus:
  enabled: true

kube-prometheus-stack:
  # Grafana configuration
  grafana:
    enabled: true
    adminUser: admin
    adminPassword: "" # Auto-generated if empty
    defaultDashboardsEnabled: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        folderAnnotation: grafana_folder
        searchNamespace: ALL
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        isDefault: false
    grafana.ini:
      server:
        root_url: "%(protocol)s://%(domain)s/grafana"
      auth.anonymous:
        enabled: false
      security:
        admin_password: "${GRAFANA_ADMIN_PASSWORD}"

  # Prometheus configuration
  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: "10GB"
      resources:
        requests:
          memory: 512Mi
          cpu: 250m
        limits:
          memory: 2Gi
          cpu: 1000m
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      # Auto-discover ServiceMonitors across namespaces
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false

  # Alertmanager configuration
  alertmanager:
    enabled: true
    alertmanagerSpec:
      resources:
        requests:
          memory: 128Mi
          cpu: 50m
        limits:
          memory: 256Mi
          cpu: 200m

  # Node exporter for node-level metrics
  nodeExporter:
    enabled: true

  # kube-state-metrics for K8s object metrics
  kubeStateMetrics:
    enabled: true

# -- Loki (log aggregation)
loki:
  enabled: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: true
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      retention_period: 168h  # 7 days
      max_query_length: 721h
      max_query_series: 500
      max_entries_limit_per_query: 5000
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      per_stream_rate_limit: 5MB
      per_stream_rate_limit_burst: 15MB
    compactor:
      working_directory: /tmp/loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      delete_request_store: filesystem
  # Disable scalable targets (SingleBinary mode)
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  # Disable caches (not needed for SingleBinary)
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  singleBinary:
    replicas: 1
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
    persistence:
      enabled: true
      size: 10Gi

# -- Promtail (log collector)
promtail:
  enabled: true
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push
        tenant_id: zenith
    snippets:
      pipelineStages:
        - cri: {}
        - json:
            expressions:
              level: level
              msg: msg
        - labels:
            level:
        - tenant:
            source: namespace
      extraRelabelConfigs:
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - source_labels: [__meta_kubernetes_container_name]
          target_label: container
        - source_labels: [__meta_kubernetes_pod_label_zenith_dev_project]
          target_label: project
        - source_labels: [__meta_kubernetes_pod_label_zenith_dev_app]
          target_label: app
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

# -- ServiceMonitor definitions for Zenith services
# All monitors use the platform namespace. Enable each when the service is deployed.
serviceMonitors:
  # Zenith API
  api:
    enabled: true
    namespace: zenith-staging
    selector:
      matchLabels:
        app: zenith-api
    endpoints:
      - port: metrics
        interval: 15s
        path: /metrics

  # Zenith Operator — enable when deployed (Phase 5)
  operator:
    enabled: false
    namespace: zenith-staging
    selector:
      matchLabels:
        app: zenith-operator
    endpoints:
      - port: metrics
        interval: 15s
        path: /metrics

  # Zenith Auth — enable when deployed (Phase 3)
  auth:
    enabled: false
    namespace: zenith-staging
    selector:
      matchLabels:
        app: zenith-auth
    endpoints:
      - port: metrics
        interval: 15s
        path: /metrics

  # Traefik Ingress Controller
  traefik:
    enabled: true
    namespace: kube-system
    selector:
      matchLabels:
        app.kubernetes.io/name: traefik
    endpoints:
      - port: metrics
        interval: 15s
        path: /metrics

  # Kong API Gateway
  kong:
    enabled: true
    namespace: kong
    selector:
      matchLabels:
        app: kong
    endpoints:
      - port: metrics
        interval: 15s
        path: /metrics

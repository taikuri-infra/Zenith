apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: zenith-alerting-rules
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: zenith
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    # Platform health alerts
    - name: zenith.platform
      rules:
        - alert: ZenithAPIDown
          expr: up{job="zenith-api"} == 0
          for: 2m
          labels:
            severity: critical
            component: api
          annotations:
            summary: "Zenith API is down"
            description: "The Zenith API has been unreachable for more than 2 minutes."

        - alert: ZenithOperatorDown
          expr: up{job="zenith-operator"} == 0
          for: 2m
          labels:
            severity: critical
            component: operator
          annotations:
            summary: "Zenith Operator is down"
            description: "The Zenith Operator has been unreachable for more than 2 minutes."

        - alert: ZenithAuthDown
          expr: up{job="zenith-auth"} == 0
          for: 2m
          labels:
            severity: critical
            component: auth
          annotations:
            summary: "Zenith Auth service is down"
            description: "The Zenith Auth service has been unreachable for more than 2 minutes."

    # Application alerts
    - name: zenith.apps
      rules:
        - alert: AppHighCPU
          expr: |
            sum by (namespace, pod) (
              rate(container_cpu_usage_seconds_total{namespace=~"zenith-.*"}[5m])
            ) > 0.8
          for: 5m
          labels:
            severity: warning
            component: app
          annotations:
            summary: "High CPU usage for {{ "{{" }} $labels.pod {{ "}}" }}"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} in {{ "{{" }} $labels.namespace {{ "}}" }} has been using >80% CPU for 5 minutes."

        - alert: AppHighMemory
          expr: |
            sum by (namespace, pod) (
              container_memory_working_set_bytes{namespace=~"zenith-.*"}
            ) / sum by (namespace, pod) (
              container_spec_memory_limit_bytes{namespace=~"zenith-.*"}
            ) > 0.85
          for: 5m
          labels:
            severity: warning
            component: app
          annotations:
            summary: "High memory usage for {{ "{{" }} $labels.pod {{ "}}" }}"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} is using >85% of memory limit."

        - alert: AppCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace=~"zenith-.*"}[1h]) > 5
          for: 5m
          labels:
            severity: critical
            component: app
          annotations:
            summary: "Pod {{ "{{" }} $labels.pod {{ "}}" }} is crash-looping"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} has restarted more than 5 times in the last hour."

        - alert: AppNotReady
          expr: |
            kube_pod_status_ready{namespace=~"zenith-.*", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
            component: app
          annotations:
            summary: "Pod {{ "{{" }} $labels.pod {{ "}}" }} is not ready"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} has been in a not-ready state for 5 minutes."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace=~"zenith-.*"}
            != kube_deployment_status_available_replicas{namespace=~"zenith-.*"}
          for: 10m
          labels:
            severity: warning
            component: app
          annotations:
            summary: "Deployment {{ "{{" }} $labels.deployment {{ "}}" }} replica mismatch"
            description: "Deployment {{ "{{" }} $labels.deployment {{ "}}" }} has not matched desired replica count for 10 minutes."

    # Database alerts
    - name: zenith.databases
      rules:
        - alert: DatabaseHighConnectionCount
          expr: |
            pg_stat_activity_count{namespace=~"zenith-.*"} > 80
          for: 5m
          labels:
            severity: warning
            component: database
          annotations:
            summary: "High connection count on {{ "{{" }} $labels.pod {{ "}}" }}"
            description: "PostgreSQL instance {{ "{{" }} $labels.pod {{ "}}" }} has >80 active connections."

        - alert: DatabaseStorageFull
          expr: |
            kubelet_volume_stats_used_bytes{namespace=~"zenith-.*", persistentvolumeclaim=~".*-db-.*"}
            / kubelet_volume_stats_capacity_bytes{namespace=~"zenith-.*", persistentvolumeclaim=~".*-db-.*"}
            > 0.85
          for: 5m
          labels:
            severity: critical
            component: database
          annotations:
            summary: "Database storage nearly full"
            description: "PVC {{ "{{" }} $labels.persistentvolumeclaim {{ "}}" }} is >85% full."

        - alert: DatabaseBackupFailed
          expr: |
            zenith_backup_last_success_timestamp{namespace=~"zenith-.*"} < (time() - 86400)
          for: 1h
          labels:
            severity: critical
            component: database
          annotations:
            summary: "Database backup overdue"
            description: "No successful backup in the last 24 hours for {{ "{{" }} $labels.database {{ "}}" }}."

    # Node alerts
    - name: zenith.nodes
      rules:
        - alert: NodeHighCPU
          expr: |
            100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 10m
          labels:
            severity: warning
            component: node
          annotations:
            summary: "High CPU on node {{ "{{" }} $labels.instance {{ "}}" }}"
            description: "Node {{ "{{" }} $labels.instance {{ "}}" }} CPU usage is >85% for 10 minutes."

        - alert: NodeHighMemory
          expr: |
            (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
          for: 5m
          labels:
            severity: critical
            component: node
          annotations:
            summary: "High memory on node {{ "{{" }} $labels.instance {{ "}}" }}"
            description: "Node {{ "{{" }} $labels.instance {{ "}}" }} memory usage is >90%."

        - alert: NodeDiskPressure
          expr: |
            (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 85
          for: 5m
          labels:
            severity: warning
            component: node
          annotations:
            summary: "Disk pressure on node {{ "{{" }} $labels.instance {{ "}}" }}"
            description: "Node {{ "{{" }} $labels.instance {{ "}}" }} root disk is >85% full."

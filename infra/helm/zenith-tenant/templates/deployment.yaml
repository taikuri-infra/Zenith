{{- range $name, $tenant := .Values.tenants }}
---
# =============================================
# Tenant: {{ $name }}
# =============================================
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $tenant.namespace }}
  labels:
    app.kubernetes.io/part-of: zenith
    {{- range $k, $v := $tenant.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
---
# ResourceQuota for tenant namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{ $name }}-quota
  namespace: {{ $tenant.namespace }}
  labels:
    app.kubernetes.io/part-of: zenith
    zenith.dev/tenant: {{ $name }}
spec:
  hard:
    requests.cpu: {{ ($tenant.quota).requestsCpu | default "2" | quote }}
    requests.memory: {{ ($tenant.quota).requestsMemory | default "2Gi" | quote }}
    limits.cpu: {{ ($tenant.quota).limitsCpu | default "4" | quote }}
    limits.memory: {{ ($tenant.quota).limitsMemory | default "4Gi" | quote }}
    pods: {{ ($tenant.quota).pods | default "10" | quote }}
    persistentvolumeclaims: {{ ($tenant.quota).pvcs | default "2" | quote }}
    requests.storage: {{ ($tenant.quota).storage | default "10Gi" | quote }}
---
# LimitRange — defaults for containers without explicit resources
apiVersion: v1
kind: LimitRange
metadata:
  name: {{ $name }}-limits
  namespace: {{ $tenant.namespace }}
  labels:
    app.kubernetes.io/part-of: zenith
    zenith.dev/tenant: {{ $name }}
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 2Gi
---
# Redirect middleware for this tenant namespace
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: {{ $tenant.namespace }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Registry secret (if enabled)
{{- if $.Values.registry.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Values.registry.secretName }}
  namespace: {{ $tenant.namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "zenith.dockerconfigjson" $ }}
{{- end }}
---
# Mission Control deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-mc
  namespace: {{ $tenant.namespace }}
  labels:
    app: zenith-mc
    app.kubernetes.io/name: zenith-mc
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: mission-control
    {{- range $k, $v := $tenant.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  replicas: {{ $tenant.mc.replicas | default 1 }}
  selector:
    matchLabels:
      app: zenith-mc
  template:
    metadata:
      labels:
        app: zenith-mc
        app.kubernetes.io/name: zenith-mc
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: mission-control
        {{- range $k, $v := $tenant.labels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
    spec:
      {{- if $.Values.registry.enabled }}
      imagePullSecrets:
        - name: {{ $.Values.registry.secretName }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: zenith-mc
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: mission-control
          image: {{ include "zenith.image" (dict "registry" $.Values.imageRegistry "image" $tenant.mc.image) }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ $tenant.mc.port | default 3100 }}
              protocol: TCP
          resources:
            {{- toYaml ($tenant.mc.resources | default (dict "requests" (dict "memory" "128Mi" "cpu" "100m") "limits" (dict "memory" "256Mi" "cpu" "250m"))) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-mc
  namespace: {{ $tenant.namespace }}
  labels:
    app: zenith-mc
    app.kubernetes.io/name: zenith-mc
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: mission-control
spec:
  ports:
    - name: http
      port: {{ $tenant.mc.port | default 3100 }}
      targetPort: {{ $tenant.mc.port | default 3100 }}
      protocol: TCP
  selector:
    app: zenith-mc
---
# Web Platform deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-web
  namespace: {{ $tenant.namespace }}
  labels:
    app: zenith-web
    app.kubernetes.io/name: zenith-web
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: web
    {{- range $k, $v := $tenant.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  replicas: {{ $tenant.web.replicas | default 1 }}
  selector:
    matchLabels:
      app: zenith-web
  template:
    metadata:
      labels:
        app: zenith-web
        app.kubernetes.io/name: zenith-web
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: web
        {{- range $k, $v := $tenant.labels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
    spec:
      {{- if $.Values.registry.enabled }}
      imagePullSecrets:
        - name: {{ $.Values.registry.secretName }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: zenith-web
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: web
          image: {{ include "zenith.image" (dict "registry" $.Values.imageRegistry "image" $tenant.web.image) }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ $tenant.web.port | default 3000 }}
              protocol: TCP
          resources:
            {{- toYaml ($tenant.web.resources | default (dict "requests" (dict "memory" "128Mi" "cpu" "100m") "limits" (dict "memory" "256Mi" "cpu" "250m"))) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-web
  namespace: {{ $tenant.namespace }}
  labels:
    app: zenith-web
    app.kubernetes.io/name: zenith-web
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: web
spec:
  ports:
    - name: http
      port: {{ $tenant.web.port | default 3000 }}
      targetPort: {{ $tenant.web.port | default 3000 }}
      protocol: TCP
  selector:
    app: zenith-web
{{- end }}

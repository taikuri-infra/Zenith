{{- range $name, $tenant := .Values.tenants }}
---
# =============================================
# Tenant: {{ $name }}
# =============================================
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $tenant.namespace }}
  labels:
    app.kubernetes.io/part-of: zenith
    {{- range $k, $v := $tenant.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
---
# Redirect middleware for this tenant namespace
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: {{ $tenant.namespace }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Registry secret (if enabled)
{{- if $.Values.registry.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Values.registry.secretName }}
  namespace: {{ $tenant.namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "zenith.dockerconfigjson" $ }}
{{- end }}
---
# Mission Control deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-mc
  namespace: {{ $tenant.namespace }}
  labels:
    app: zenith-mc
    app.kubernetes.io/name: zenith-mc
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: mission-control
    {{- range $k, $v := $tenant.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  replicas: {{ $tenant.mc.replicas | default 1 }}
  selector:
    matchLabels:
      app: zenith-mc
  template:
    metadata:
      labels:
        app: zenith-mc
        app.kubernetes.io/name: zenith-mc
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: mission-control
        {{- range $k, $v := $tenant.labels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
    spec:
      {{- if $.Values.registry.enabled }}
      imagePullSecrets:
        - name: {{ $.Values.registry.secretName }}
      {{- end }}
      containers:
        - name: mission-control
          image: {{ include "zenith.image" (dict "registry" $.Values.imageRegistry "image" $tenant.mc.image) }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $tenant.mc.port | default 3100 }}
              protocol: TCP
          resources:
            {{- toYaml ($tenant.mc.resources | default (dict "requests" (dict "memory" "128Mi" "cpu" "100m") "limits" (dict "memory" "256Mi" "cpu" "250m"))) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-mc
  namespace: {{ $tenant.namespace }}
  labels:
    app: zenith-mc
    app.kubernetes.io/name: zenith-mc
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: mission-control
spec:
  ports:
    - name: http
      port: {{ $tenant.mc.port | default 3100 }}
      targetPort: {{ $tenant.mc.port | default 3100 }}
      protocol: TCP
  selector:
    app: zenith-mc
---
# Web Platform deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-web
  namespace: {{ $tenant.namespace }}
  labels:
    app: zenith-web
    app.kubernetes.io/name: zenith-web
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: web
    {{- range $k, $v := $tenant.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  replicas: {{ $tenant.web.replicas | default 1 }}
  selector:
    matchLabels:
      app: zenith-web
  template:
    metadata:
      labels:
        app: zenith-web
        app.kubernetes.io/name: zenith-web
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: web
        {{- range $k, $v := $tenant.labels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
    spec:
      {{- if $.Values.registry.enabled }}
      imagePullSecrets:
        - name: {{ $.Values.registry.secretName }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "zenith.image" (dict "registry" $.Values.imageRegistry "image" $tenant.web.image) }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $tenant.web.port | default 3000 }}
              protocol: TCP
          resources:
            {{- toYaml ($tenant.web.resources | default (dict "requests" (dict "memory" "128Mi" "cpu" "100m") "limits" (dict "memory" "256Mi" "cpu" "250m"))) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-web
  namespace: {{ $tenant.namespace }}
  labels:
    app: zenith-web
    app.kubernetes.io/name: zenith-web
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: web
spec:
  ports:
    - name: http
      port: {{ $tenant.web.port | default 3000 }}
      targetPort: {{ $tenant.web.port | default 3000 }}
      protocol: TCP
  selector:
    app: zenith-web
{{- end }}

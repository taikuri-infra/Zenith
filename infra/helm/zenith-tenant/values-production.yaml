# Production values for zenith-tenant
imageRegistry: ""  # set via Terraform
imagePullPolicy: IfNotPresent

registry:
  enabled: true
  secretName: harbor-registry
  # host, username, password injected via Terraform set_sensitive

certManager:
  issuer: letsencrypt-prod
  issuerKind: ClusterIssuer

tenants: {}

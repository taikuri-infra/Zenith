{{- if .Values.keycloak.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: keycloak-tls
  issuerRef:
    name: {{ .Values.certManager.issuer }}
    kind: {{ .Values.certManager.issuerKind }}
  dnsNames:
    - {{ .Values.keycloak.host }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: auth
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.keycloak.host }}`)
      kind: Rule
      services:
        - name: keycloak
          port: 80
  tls:
    secretName: keycloak-tls
{{- end }}

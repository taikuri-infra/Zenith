---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificate.secretName }}
  namespace: {{ include "zenith.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: {{ .Values.certificate.secretName }}
  issuerRef:
    name: {{ .Values.certManager.issuer }}
    kind: {{ .Values.certManager.issuerKind }}
  dnsNames:
    {{- range .Values.certificate.domains }}
    - {{ . | quote }}
    {{- end }}
{{- range .Values.appCertificates }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .secretName }}
  namespace: zenith-apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: {{ .secretName }}
  issuerRef:
    name: {{ $.Values.certManager.issuer }}
    kind: {{ $.Values.certManager.issuerKind }}
  dnsNames:
    {{- range .domains }}
    - {{ . | quote }}
    {{- end }}
{{- end }}

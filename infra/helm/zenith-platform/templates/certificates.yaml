---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificate.secretName }}
  namespace: {{ include "zenith.namespace" . }}
spec:
  secretName: {{ .Values.certificate.secretName }}
  issuerRef:
    name: {{ .Values.certManager.issuer }}
    kind: {{ .Values.certManager.issuerKind }}
  dnsNames:
    {{- range .Values.certificate.domains }}
    - {{ . }}
    {{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: zenith-secrets
  namespace: {{ include "zenith.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "zenith.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc }}
  admin-email: {{ .Values.secrets.adminEmail | b64enc }}
  admin-password: {{ .Values.secrets.adminPassword | b64enc }}
{{- if .Values.registry.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.registry.secretName }}
  namespace: {{ include "zenith.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "zenith.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "zenith.dockerconfigjson" . }}
{{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: zenith-secrets
  namespace: {{ include "zenith.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "zenith.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc }}
  admin-email: {{ .Values.secrets.adminEmail | b64enc }}
  admin-password: {{ .Values.secrets.adminPassword | b64enc }}
  {{- if .Values.secrets.githubWebhookSecret }}
  github-webhook-secret: {{ .Values.secrets.githubWebhookSecret | b64enc }}
  {{- end }}
  {{- if .Values.secrets.secretsEncryptionKey }}
  secrets-encryption-key: {{ .Values.secrets.secretsEncryptionKey | b64enc }}
  {{- end }}
  {{/* resend-api-key and google-client-id live in zenith-auth-secrets (SealedSecret) */}}
{{- if .Values.secrets.keycloakAdminUser }}
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: {{ include "zenith.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "zenith.labels" . | nindent 4 }}
type: Opaque
data:
  admin-user: {{ .Values.secrets.keycloakAdminUser | b64enc }}
  admin-password: {{ .Values.secrets.keycloakAdminPassword | b64enc }}
{{- end }}
{{- if .Values.registry.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.registry.secretName }}
  namespace: {{ include "zenith.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "zenith.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "zenith.dockerconfigjson" . }}
{{- end }}

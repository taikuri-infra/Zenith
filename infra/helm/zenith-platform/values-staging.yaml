# Staging values for zenith-platform (shared infrastructure)
namespace: zenith-staging

buildInfra:
  enabled: true

registry:
  enabled: true
  secretName: harbor-registry
  # host, username, password injected via Terraform set_sensitive

postgres:
  enabled: true
  image: ghcr.io/cloudnative-pg/postgresql:16.6
  instances: 1
  storage: 2Gi
  database: zenith
  user: zenith
  maxConnections: "100"
  sharedBuffers: "128MB"
  monitoring: true
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

tenantQuotas:
  enabled: true

certManager:
  issuer: letsencrypt-prod
  issuerKind: ClusterIssuer

certificate:
  secretName: staging-tls
  domains:
    - stage.freezenith.com
    - api.stage.freezenith.com
    - ms.stage.freezenith.com
    - cloud.stage.freezenith.com
    - embermind-ms.stage.freezenith.com
    - embermind.stage.freezenith.com

keycloak:
  enabled: true
  host: auth.stage.freezenith.com

kong:
  enabled: false

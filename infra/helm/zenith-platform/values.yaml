namespace: zenith-platform

# Build infrastructure (Kaniko build jobs + app deploy namespaces)
# Creates zenith-builds and zenith-apps namespaces, plus registry-credentials
# secret (reuses registry.host/username/password for the dockerconfigjson).
buildInfra:
  enabled: false

# Registry credentials
registry:
  enabled: false
  secretName: harbor-registry
  host: ""
  username: ""
  password: ""

# Secrets
secrets:
  jwtSecret: ""
  adminEmail: ""
  adminPassword: ""
  githubWebhookSecret: ""
  secretsEncryptionKey: ""
  keycloakAdminUser: ""
  keycloakAdminPassword: ""

# PostgreSQL (CloudNativePG)
postgres:
  enabled: true
  image: ghcr.io/cloudnative-pg/postgresql:16.6
  instances: 1
  storage: 5Gi
  database: zenith
  user: zenith
  maxConnections: "100"
  sharedBuffers: "128MB"
  monitoring: false
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

# TLS Certificate
certManager:
  issuer: letsencrypt-prod
  issuerKind: ClusterIssuer

certificate:
  secretName: freezenith-tls
  domains:
    - freezenith.com
    - www.freezenith.com
    - api.freezenith.com

# Tenant quota/limit templates (ConfigMaps for Temporal provisioning)
tenantQuotas:
  enabled: false

# Legacy Kong routes — removed, now using APISIX via zenith-api chart
# kong:
#   enabled: false

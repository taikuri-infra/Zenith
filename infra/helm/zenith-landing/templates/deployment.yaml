---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-landing
  namespace: {{ .Values.namespace }}
  labels:
    app: zenith-landing
    app.kubernetes.io/name: zenith-landing
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: landing
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: zenith-landing
  template:
    metadata:
      labels:
        app: zenith-landing
        app.kubernetes.io/name: zenith-landing
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: landing
    spec:
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      containers:
        - name: landing
          image: {{ include "zenith.image" (dict "registry" .Values.imageRegistry "image" .Values.image) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-landing
  namespace: {{ .Values.namespace }}
  labels:
    app: zenith-landing
    app.kubernetes.io/name: zenith-landing
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: landing
spec:
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
  selector:
    app: zenith-landing

{{- if and .Values.prodIngress .Values.prodIngress.enabled }}
# Production marketing domains (freezenith.com / www) served by the same
# zenith-landing deployment on the staging cluster. Uses a dedicated certificate
# so it never affects the shared staging-tls certificate.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.prodIngress.tlsSecret }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.prodIngress.tlsSecret }}
  issuerRef:
    name: {{ .Values.prodIngress.issuer }}
    kind: ClusterIssuer
  dnsNames:
    {{- range .Values.prodIngress.hosts }}
    - {{ . | quote }}
    {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zenith-landing-prod
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: {{ include "zenith.hostMatch" .Values.prodIngress.hosts }}
      kind: Rule
      services:
        - name: zenith-landing
          port: {{ .Values.port }}
  tls:
    secretName: {{ .Values.prodIngress.tlsSecret }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zenith-landing-prod-redirect
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - web
  routes:
    - match: {{ include "zenith.hostMatch" .Values.prodIngress.hosts }}
      kind: Rule
      middlewares:
        - name: redirect-to-https
      services:
        - name: zenith-landing
          port: {{ .Values.port }}
{{- end }}

namespace: zenith-platform
replicas: 1
image: zenith-landing:latest
imageRegistry: ""
imagePullPolicy: Never
imagePullSecret: ""
port: 3000

ingress:
  hosts:
    - freezenith.com
    - www.freezenith.com
  tlsSecret: freezenith-tls

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 100m

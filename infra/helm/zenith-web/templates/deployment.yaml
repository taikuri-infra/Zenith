---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-web
  namespace: {{ .Values.namespace }}
  labels:
    app: zenith-web
    app.kubernetes.io/name: zenith-web
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: zenith-web
  template:
    metadata:
      labels:
        app: zenith-web
        app.kubernetes.io/name: zenith-web
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: web
    spec:
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "zenith.image" (dict "registry" .Values.imageRegistry "image" .Values.image) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          {{- if .Values.env }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3

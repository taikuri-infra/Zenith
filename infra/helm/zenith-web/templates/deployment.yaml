---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-web
  namespace: {{ .Values.namespace }}
  labels:
    app: zenith-web
    app.kubernetes.io/name: zenith-web
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: zenith-web
  template:
    metadata:
      labels:
        app: zenith-web
        app.kubernetes.io/name: zenith-web
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: web
    spec:
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: zenith-web
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      initContainers:
        - name: copy-static
          image: {{ include "zenith.image" (dict "registry" .Values.imageRegistry "image" .Values.image) }}
          command: ['sh', '-c', 'cp -a /app/apps/web/.next/static/* /static/']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: next-static
              mountPath: /static
      containers:
        - name: web
          image: {{ include "zenith.image" (dict "registry" .Values.imageRegistry "image" .Values.image) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          {{- if .Values.env }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: next-static
              mountPath: /app/apps/web/.next/static
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: next-static
          emptyDir: {}
        - name: tmp
          emptyDir: {}

# Staging values for zenith-web
namespace: zenith-staging
replicas: 1
image: zenith-web:sha-ea81749
imageRegistry: ""  # set via ArgoCD/Terraform
imagePullPolicy: IfNotPresent
imagePullSecret: ""  # set via ArgoCD/Terraform
port: 3000

env:
  NEXT_PUBLIC_API_URL: "https://api.stage.freezenith.com"
  NEXT_PUBLIC_ZENITH_MODE: "saas"

ingress:
  hosts:
    - app.stage.freezenith.com
  tlsSecret: staging-tls

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 100m

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: databases.zenith.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: zenith.dev
  names:
    kind: Database
    listKind: DatabaseList
    plural: databases
    singular: database
    shortNames:
      - db
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Engine
          type: string
          jsonPath: .spec.engine
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Storage
          type: string
          jsonPath: .spec.storage
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: Database is the Schema for the databases API. Represents a managed database.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: DatabaseSpec defines the desired state of a Database
              type: object
              required:
                - engine
                - version
                - storage
              properties:
                engine:
                  description: Engine is the database engine type
                  type: string
                  enum:
                    - postgresql
                    - mysql
                    - mongodb
                    - redis
                version:
                  description: Version is the database engine version
                  type: string
                storage:
                  description: Storage is the storage size (e.g., "10Gi", "100Gi")
                  anyOf:
                    - type: integer
                    - type: string
                  x-kubernetes-int-or-string: true
                replicas:
                  description: Replicas is the number of database instances (for HA)
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 5
                  default: 1
                backup:
                  description: Backup configures automated backups
                  type: object
                  properties:
                    enabled:
                      description: Enabled enables automated backups
                      type: boolean
                      default: true
                    schedule:
                      description: Schedule is the cron schedule for backups
                      type: string
                      default: "0 2 * * *"
                    retentionDays:
                      description: RetentionDays is the number of days to retain backups
                      type: integer
                      default: 7
                resources:
                  description: Resources defines CPU/memory limits
                  type: object
                  properties:
                    cpu:
                      description: CPU limit
                      anyOf:
                        - type: integer
                        - type: string
                      x-kubernetes-int-or-string: true
                    memory:
                      description: Memory limit
                      anyOf:
                        - type: integer
                        - type: string
                      x-kubernetes-int-or-string: true
                parameters:
                  description: Parameters are engine-specific configuration parameters
                  type: object
                  additionalProperties:
                    type: string
            status:
              description: DatabaseStatus defines the observed state of Database
              type: object
              properties:
                phase:
                  description: Phase represents the current lifecycle phase
                  type: string
                  enum:
                    - Pending
                    - Provisioning
                    - Ready
                    - Failed
                    - Deleting
                connectionString:
                  description: ConnectionString is the connection string (stored in Secret)
                  type: string
                host:
                  description: Host is the database host
                  type: string
                port:
                  description: Port is the database port
                  type: integer
                  format: int32
                hetznerVolumeId:
                  description: HetznerVolumeID is the Hetzner volume ID backing this database
                  type: string
                secretName:
                  description: SecretName is the name of the K8s Secret containing credentials
                  type: string
                storageUsed:
                  description: StorageUsed is the current storage usage
                  type: string
                lastBackupTime:
                  description: LastBackupTime is the timestamp of the last backup
                  type: string
                  format: date-time
                conditions:
                  description: Conditions represent the latest available observations
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        type: string
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$

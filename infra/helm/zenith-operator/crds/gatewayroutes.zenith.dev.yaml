apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatewayroutes.zenith.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: zenith.dev
  names:
    kind: GatewayRoute
    listKind: GatewayRouteList
    plural: gatewayroutes
    singular: gatewayroute
    shortNames:
      - gwr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Path
          type: string
          jsonPath: .spec.path
        - name: Service
          type: string
          jsonPath: .spec.service.name
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: GatewayRoute is the Schema for the gatewayroutes API. Represents an API gateway route.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: GatewayRouteSpec defines the desired state of a GatewayRoute
              type: object
              required:
                - path
                - service
              properties:
                path:
                  description: Path is the URL path pattern (e.g., "/api/v1/users")
                  type: string
                methods:
                  description: Methods is the list of allowed HTTP methods
                  type: array
                  default:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                  items:
                    type: string
                service:
                  description: Service is the backend service reference
                  type: object
                  required:
                    - name
                    - port
                  properties:
                    name:
                      description: Name is the service name
                      type: string
                    port:
                      description: Port is the service port
                      type: integer
                      format: int32
                plugins:
                  description: Plugins is the list of gateway plugins to apply
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        description: Name is the plugin name (e.g., "jwt-auth", "rate-limiting")
                        type: string
                      config:
                        description: Config is the plugin configuration
                        type: object
                        additionalProperties:
                          type: string
                auth:
                  description: Auth configures authentication for this route
                  type: object
                  properties:
                    enabled:
                      description: Enabled enables JWT authentication
                      type: boolean
                      default: true
                    scopes:
                      description: Scopes required for this route
                      type: array
                      items:
                        type: string
                rateLimit:
                  description: RateLimit configures rate limiting
                  type: object
                  properties:
                    requestsPerSecond:
                      description: RequestsPerSecond is the rate limit
                      type: integer
                    requestsPerMinute:
                      description: RequestsPerMinute is the rate limit per minute
                      type: integer
                cors:
                  description: CORS configures CORS for this route
                  type: object
                  properties:
                    allowedOrigins:
                      description: AllowedOrigins is the list of allowed origins
                      type: array
                      items:
                        type: string
                    allowedMethods:
                      description: AllowedMethods is the list of allowed methods
                      type: array
                      items:
                        type: string
                    allowedHeaders:
                      description: AllowedHeaders is the list of allowed headers
                      type: array
                      items:
                        type: string
            status:
              description: GatewayRouteStatus defines the observed state of GatewayRoute
              type: object
              properties:
                phase:
                  description: Phase represents the current lifecycle phase
                  type: string
                  enum:
                    - Pending
                    - Configuring
                    - Active
                    - Failed
                gatewayRouteId:
                  description: GatewayRouteID is the ID of the route in the gateway
                  type: string
                conditions:
                  description: Conditions represent the latest available observations
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        type: string
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$

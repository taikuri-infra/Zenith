apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apps.zenith.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: zenith.dev
  names:
    kind: App
    listKind: AppList
    plural: apps
    singular: app
    shortNames:
      - app
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: URL
          type: string
          jsonPath: .status.url
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: App is the Schema for the apps API. Represents an application deployment.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: AppSpec defines the desired state of an App deployment
              type: object
              required:
                - image
              properties:
                image:
                  description: Image is the container image to deploy
                  type: string
                replicas:
                  description: Replicas is the desired number of replicas
                  type: integer
                  format: int32
                  minimum: 0
                  maximum: 100
                  default: 1
                port:
                  description: Port is the container port the app listens on
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 65535
                  default: 8080
                env:
                  description: Env is a list of environment variables
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                      valueFrom:
                        type: object
                        properties:
                          configMapKeyRef:
                            type: object
                            properties:
                              name:
                                type: string
                              key:
                                type: string
                              optional:
                                type: boolean
                          secretKeyRef:
                            type: object
                            properties:
                              name:
                                type: string
                              key:
                                type: string
                              optional:
                                type: boolean
                          fieldRef:
                            type: object
                            properties:
                              fieldPath:
                                type: string
                              apiVersion:
                                type: string
                domain:
                  description: Domain is an optional custom domain for the app
                  type: string
                resources:
                  description: Resources defines CPU/memory resource limits
                  type: object
                  properties:
                    cpu:
                      description: CPU limit (e.g., "500m", "1")
                      anyOf:
                        - type: integer
                        - type: string
                      x-kubernetes-int-or-string: true
                    memory:
                      description: Memory limit (e.g., "256Mi", "1Gi")
                      anyOf:
                        - type: integer
                        - type: string
                      x-kubernetes-int-or-string: true
                healthCheck:
                  description: HealthCheck defines the health check configuration
                  type: object
                  properties:
                    path:
                      description: Path is the HTTP path for health checks
                      type: string
                      default: "/health"
                    port:
                      description: Port is the port for health checks (defaults to app port)
                      type: integer
                      format: int32
                    intervalSeconds:
                      description: IntervalSeconds is the interval between health checks
                      type: integer
                      format: int32
                      default: 30
                autoScale:
                  description: AutoScale defines autoscaling settings
                  type: object
                  properties:
                    minReplicas:
                      description: MinReplicas is the minimum number of replicas
                      type: integer
                      format: int32
                      minimum: 1
                      default: 1
                    maxReplicas:
                      description: MaxReplicas is the maximum number of replicas
                      type: integer
                      format: int32
                      minimum: 1
                      default: 10
                    targetCPUPercent:
                      description: TargetCPUPercent is the target CPU utilization percentage
                      type: integer
                      format: int32
                      minimum: 1
                      maximum: 100
                      default: 80
                buildSource:
                  description: BuildSource defines source-based deployment (Git URL)
                  type: object
                  required:
                    - gitURL
                  properties:
                    gitURL:
                      description: GitURL is the git repository URL
                      type: string
                    branch:
                      description: Branch is the git branch to build from
                      type: string
                      default: "main"
                    dockerfile:
                      description: Dockerfile path relative to repo root
                      type: string
                      default: "Dockerfile"
            status:
              description: AppStatus defines the observed state of App
              type: object
              properties:
                phase:
                  description: Phase represents the current lifecycle phase
                  type: string
                  enum:
                    - Pending
                    - Building
                    - Deploying
                    - Running
                    - Failed
                    - Stopped
                readyReplicas:
                  description: ReadyReplicas is the number of ready replicas
                  type: integer
                  format: int32
                url:
                  description: URL is the external URL of the app
                  type: string
                internalURL:
                  description: InternalURL is the cluster-internal URL
                  type: string
                conditions:
                  description: Conditions represent the latest available observations
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        type: string
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                lastDeployedAt:
                  description: LastDeployedAt is the timestamp of the last deployment
                  type: string
                  format: date-time
                currentImage:
                  description: CurrentImage is the currently running image
                  type: string

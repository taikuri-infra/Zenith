# PodDisruptionBudgets — ensure availability during voluntary disruptions
# maxUnavailable: 1 is safe for any replica count (including single-replica)

{{- if .Values.api.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zenith-api
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-api" "component" "api") | nindent 4 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: zenith-api
{{- end }}

{{- if .Values.landing.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zenith-landing
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-landing" "component" "landing") | nindent 4 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: zenith-landing
{{- end }}

{{- if .Values.mcDemo.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zenith-mc-demo
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-mc-demo" "component" "mission-control-demo") | nindent 4 }}
spec:
  maxUnavailable: 1

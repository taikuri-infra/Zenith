# KEDA HTTPScaledObjects — scale-to-zero for stateless services
# Requires: KEDA + keda-add-ons-http installed in the cluster

{{- if .Values.keda.enabled }}

{{- if .Values.api.enabled }}
---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: zenith-api
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-api" "component" "api") | nindent 4 }}
spec:
  hosts:
    - {{ .Values.ingress.api.host }}
  pathPrefixes:
    - /
  scaleTargetRef:
    name: zenith-api
    kind: Deployment
    service: zenith-api
    port: {{ .Values.api.port }}
  replicas:
    min: {{ .Values.keda.api.minReplicas | default 0 }}
    max: {{ .Values.keda.api.maxReplicas | default 5 }}
  scalingMetric:
    requestRate:
      targetValue: {{ .Values.keda.api.targetRequestRate | default 10 }}
      granularity: 1s
      window: 1m
{{- end }}

{{- if .Values.landing.enabled }}
---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: zenith-landing
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-landing" "component" "landing") | nindent 4 }}
spec:
  hosts:
    {{- range .Values.ingress.landing.hosts }}
    - {{ . }}
    {{- end }}
  pathPrefixes:
    - /
  scaleTargetRef:
    name: zenith-landing
    kind: Deployment
    service: zenith-landing
    port: {{ .Values.landing.port }}
  replicas:
    min: {{ .Values.keda.landing.minReplicas | default 0 }}
    max: {{ .Values.keda.landing.maxReplicas | default 3 }}
  scalingMetric:
    requestRate:
      targetValue: {{ .Values.keda.landing.targetRequestRate | default 20 }}
      granularity: 1s
      window: 1m
{{- end }}

{{- end }}

{{- if .Values.postgres.enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: zenith-postgres
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-postgres" "component" "database") | nindent 4 }}
spec:
  instances: {{ .Values.postgres.instances | default 1 }}
  imageName: {{ .Values.postgres.image }}

  bootstrap:
    initdb:
      database: {{ .Values.postgres.database }}
      owner: {{ .Values.postgres.user }}

  postgresql:
    parameters:
      max_connections: {{ .Values.postgres.maxConnections | default "100" | quote }}
      shared_buffers: {{ .Values.postgres.sharedBuffers | default "128MB" | quote }}

  storage:
    size: {{ .Values.postgres.storage }}

  resources:
    requests:
      memory: {{ .Values.postgres.resources.requests.memory }}
      cpu: {{ .Values.postgres.resources.requests.cpu }}
    limits:
      memory: {{ .Values.postgres.resources.limits.memory }}
      cpu: {{ .Values.postgres.resources.limits.cpu }}

  monitoring:
    enablePodMonitor: {{ .Values.postgres.monitoring | default false }}

  {{- if .Values.postgres.backup }}
  {{- if .Values.postgres.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.postgres.backup.destinationPath }}
      endpointURL: {{ .Values.postgres.backup.endpointURL | default "" }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.postgres.backup.secretName | default "cnpg-backup-creds" }}
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: {{ .Values.postgres.backup.secretName | default "cnpg-backup-creds" }}
          key: ACCESS_SECRET_KEY
    retentionPolicy: {{ .Values.postgres.backup.retentionPolicy | default "7d" }}
  {{- end }}
  {{- end }}
{{- end }}

---
# Platform TLS certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.platformCertificate.secretName }}
  namespace: {{ include "zenith.namespace" . }}
spec:
  secretName: {{ .Values.platformCertificate.secretName }}
  issuerRef:
    name: {{ .Values.certManager.issuer }}
    kind: {{ .Values.certManager.issuerKind }}
  dnsNames:
    {{- range .Values.platformCertificate.domains }}
    - {{ . }}
    {{- end }}
{{- range $name, $tenant := .Values.tenants }}
{{- if $tenant.certificate }}
---
# Tenant certificate: {{ $name }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $tenant.certificate.secretName }}
  namespace: {{ $tenant.namespace }}
spec:
  secretName: {{ $tenant.certificate.secretName }}
  issuerRef:
    name: {{ $.Values.certManager.issuer }}
    kind: {{ $.Values.certManager.issuerKind }}
  dnsNames:
    {{- range $tenant.certificate.domains }}
    - {{ . }}
    {{- end }}
{{- end }}
{{- end }}

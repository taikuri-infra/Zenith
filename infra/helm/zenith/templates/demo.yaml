{{- if .Values.mcDemo.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-mc-demo
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-mc-demo" "component" "mission-control-demo") | nindent 4 }}
spec:
  replicas: {{ .Values.mcDemo.replicas }}
  selector:
    matchLabels:
      app: zenith-mc-demo
  template:
    metadata:
      labels:
        app: zenith-mc-demo
        app.kubernetes.io/name: zenith-mc-demo
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: mission-control-demo
    spec:
      containers:
        - name: mission-control
          image: {{ .Values.mcDemo.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mcDemo.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.mcDemo.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-mc-demo
  namespace: {{ include "zenith.namespace" . }}
  labels:
    {{- include "zenith.componentLabels" (dict "name" "zenith-mc-demo" "component" "mission-control-demo") | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.mcDemo.port }}
      targetPort: {{ .Values.mcDemo.port }}
      protocol: TCP
  selector:
    app: zenith-mc-demo
{{- end }}
---

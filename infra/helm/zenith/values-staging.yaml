# Staging values for Zenith platform
# Deployed via: cd infra/terraform/staging-k8s && terraform apply

global:
  domain: freezenith.com
  imageRegistry: "registry.stage.freezenith.com/zenith-stage"
  imagePullPolicy: IfNotPresent

registry:
  enabled: true
  secretName: harbor-registry
  # host, username, password injected via Terraform set_sensitive

platform:
  namespace: zenith-staging

api:
  replicas: 1
  image: zenith-api:0.2.0
  env:
    CORS_ORIGINS: "https://stage.freezenith.com,https://ms.stage.freezenith.com,https://cloud.stage.freezenith.com"
    # DB_HOST, DB_PORT, DB_USER, DB_NAME, DB_PASSWORD all come from CNPG secret (zenith-postgres-app)
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

landing:
  image: zenith-landing:0.2.0
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

kong:
  enabled: true
  plugins:
    - zenith-rate-limiting
    - zenith-cors
  rateLimiting:
    enabled: true
    requestsPerMinute: 120
  cors:
    enabled: true
    origins:
      - "https://stage.freezenith.com"
      - "https://ms.stage.freezenith.com"
      - "https://cloud.stage.freezenith.com"

mcDemo:
  enabled: false

webDemo:
  enabled: false

postgres:
  image: ghcr.io/cloudnative-pg/postgresql:16.6
  instances: 1
  storage: 2Gi
  monitoring: true
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

platformCertificate:
  secretName: staging-tls
  domains:
    - stage.freezenith.com
    - api.stage.freezenith.com
    - ms.stage.freezenith.com
    - cloud.stage.freezenith.com
    - embermind-ms.stage.freezenith.com
    - embermind.stage.freezenith.com

ingress:
  landing:
    hosts:
      - stage.freezenith.com
    tlsSecret: staging-tls
  api:
    host: api.stage.freezenith.com
    tlsSecret: staging-tls
  demoMc:
    host: ms.stage.freezenith.com
    tlsSecret: staging-tls
  demoWeb:
    host: cloud.stage.freezenith.com
    tlsSecret: staging-tls

tenants:
  embermind:
    domain: freezenith.com
    namespace: zenith-embermind-staging
    labels:
      zenith.dev/tenant: embermind
      zenith.dev/domain: embermind.app
    mc:
      image: zenith-mc:0.2.0
      host: embermind-ms.stage.freezenith.com
      replicas: 1
    web:
      image: zenith-web:0.2.0
      host: embermind.stage.freezenith.com
      replicas: 1
    certificate:
      secretName: embermind-staging-tls
      domains:
        - embermind-ms.stage.freezenith.com
        - embermind.stage.freezenith.com

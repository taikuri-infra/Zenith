# Staging values for Zenith platform
# Deployed via: cd infra/terraform/staging-k8s && terraform apply

global:
  domain: freezenith.com
  imagePullPolicy: Never

platform:
  namespace: zenith-staging

api:
  replicas: 1
  env:
    CORS_ORIGINS: "https://stage.freezenith.com,https://ms.stage.freezenith.com,https://cloud.stage.freezenith.com"
    DB_HOST: zenith-postgres.zenith-staging.svc.cluster.local
    DB_PORT: "5432"
    DB_USER: zenith
    DB_NAME: zenith
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

landing:
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

mcDemo:
  enabled: false

webDemo:
  enabled: false

postgres:
  storage: 2Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

platformCertificate:
  secretName: staging-tls
  domains:
    - stage.freezenith.com
    - api.stage.freezenith.com
    - ms.stage.freezenith.com
    - cloud.stage.freezenith.com
    - embermind-ms.stage.freezenith.com
    - embermind.stage.freezenith.com

ingress:
  landing:
    hosts:
      - stage.freezenith.com
    tlsSecret: staging-tls
  api:
    host: api.stage.freezenith.com
    tlsSecret: staging-tls
  demoMc:
    host: ms.stage.freezenith.com
    tlsSecret: staging-tls
  demoWeb:
    host: cloud.stage.freezenith.com
    tlsSecret: staging-tls

tenants:
  embermind:
    domain: freezenith.com
    namespace: zenith-embermind-staging
    labels:
      zenith.dev/tenant: embermind
      zenith.dev/domain: embermind.app
    mc:
      image: zenith-mc:latest
      host: embermind-ms.stage.freezenith.com
      replicas: 1
    web:
      image: zenith-web:latest
      host: embermind.stage.freezenith.com
      replicas: 1
    certificate:
      secretName: embermind-staging-tls
      domains:
        - embermind-ms.stage.freezenith.com
        - embermind.stage.freezenith.com

# Zenith Platform Helm Chart — Default Values
# Override with values-staging.yaml or values-production.yaml

global:
  domain: freezenith.com
  imagePullPolicy: Never

# -- Platform namespace
platform:
  namespace: zenith-platform

# -- PostgreSQL
postgres:
  enabled: true
  image: postgres:16-alpine
  port: 5432
  storage: 5Gi
  database: zenith
  user: zenith
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

# -- Zenith API
api:
  enabled: true
  replicas: 1
  image: zenith-api:latest
  port: 8080
  metricsPort: 9090
  env:
    CORS_ORIGINS: ""
    DB_HOST: zenith-postgres.zenith-platform.svc.cluster.local
    DB_PORT: "5432"
    DB_USER: zenith
    DB_NAME: zenith
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

# -- Landing Page
landing:
  enabled: true
  replicas: 1
  image: zenith-landing:latest
  port: 3000
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

# -- Mission Control Demo
mcDemo:
  enabled: true
  replicas: 1
  image: zenith-mc-demo:latest
  port: 3100
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

# -- Web Platform Demo
webDemo:
  enabled: true
  replicas: 1
  image: zenith-web-demo:latest
  port: 3000
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

# -- Secrets (set via --set or values file, never commit real values)
secrets:
  jwtSecret: ""
  adminEmail: ""
  adminPassword: ""
  dbPassword: changeme

# -- TLS Certificates (cert-manager)
certManager:
  issuer: letsencrypt-prod
  issuerKind: ClusterIssuer

# -- Platform TLS certificate
platformCertificate:
  secretName: freezenith-tls
  domains:
    - freezenith.com
    - www.freezenith.com
    - api.freezenith.com
    - demo-ms.freezenith.com
    - demo-cloud.freezenith.com

# -- Ingress (Traefik IngressRoutes)
ingress:
  landing:
    hosts:
      - freezenith.com
      - www.freezenith.com
    tlsSecret: freezenith-tls
  api:
    host: api.freezenith.com
    tlsSecret: freezenith-tls
  demoMc:
    host: demo-ms.freezenith.com
    tlsSecret: freezenith-tls
  demoWeb:
    host: demo-cloud.freezenith.com
    tlsSecret: freezenith-tls

# -- Customer Tenants
# Each tenant gets its own namespace, MC deployment, Web deployment,
# certificate, and ingress routes.
tenants: {}

# Zenith Platform Helm Chart — Default Values
# Override with values-staging.yaml or values-production.yaml

global:
  domain: freezenith.com
  imageRegistry: ""      # e.g. "registry.stage.freezenith.com/zenith-stage"
  imagePullPolicy: Never

# -- Registry credentials (for imagePullSecret)
registry:
  enabled: false
  secretName: harbor-registry
  host: ""
  username: ""
  password: ""

# -- Platform namespace
platform:
  namespace: zenith-platform

# -- PostgreSQL (CloudNativePG operator)
# CNPG auto-creates secrets: zenith-postgres-app (username, password, host, port, dbname, uri)
# CNPG auto-creates services: zenith-postgres-rw (primary), zenith-postgres-ro (replicas), zenith-postgres-r (any)
postgres:
  enabled: true
  image: ghcr.io/cloudnative-pg/postgresql:16.6
  instances: 1          # 1 for staging, 3 for production HA
  storage: 5Gi
  database: zenith
  user: zenith
  maxConnections: "100"
  sharedBuffers: "128MB"
  monitoring: false     # enable when Prometheus is available
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  # backup:             # enable for production
  #   enabled: false
  #   destinationPath: "s3://zenith-backups/postgres/"
  #   endpointURL: ""
  #   secretName: cnpg-backup-creds
  #   retentionPolicy: "7d"

# -- Zenith API
api:
  enabled: true
  replicas: 1
  image: zenith-api:latest
  port: 8080
  metricsPort: 9090
  env:
    CORS_ORIGINS: ""
    DB_HOST: zenith-postgres.zenith-platform.svc.cluster.local
    DB_PORT: "5432"
    DB_USER: zenith
    DB_NAME: zenith
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

# -- Landing Page
landing:
  enabled: true
  replicas: 1
  image: zenith-landing:latest
  port: 3000
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

# -- Mission Control Demo
mcDemo:
  enabled: true
  replicas: 1
  image: zenith-mc-demo:latest
  port: 3100
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

# -- Web Platform Demo
webDemo:
  enabled: true
  replicas: 1
  image: zenith-web-demo:latest
  port: 3000
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

# -- KEDA scale-to-zero (requires KEDA + HTTP add-on installed)
keda:
  enabled: false
  api:
    minReplicas: 0
    maxReplicas: 5
    targetRequestRate: 10
  landing:
    minReplicas: 0
    maxReplicas: 3
    targetRequestRate: 20
  mcDemo:
    minReplicas: 0
    maxReplicas: 3
    targetRequestRate: 10
  webDemo:
    minReplicas: 0
    maxReplicas: 3
    targetRequestRate: 10

# Legacy Kong — removed, now using APISIX via zenith-api chart
# kong:
#   enabled: false

# -- Secrets (set via --set or values file, never commit real values)
secrets:
  jwtSecret: ""
  adminEmail: ""
  adminPassword: ""

# -- TLS Certificates (cert-manager)
certManager:
  issuer: letsencrypt-prod
  issuerKind: ClusterIssuer

# -- Platform TLS certificate
platformCertificate:
  secretName: freezenith-tls
  domains:
    - freezenith.com
    - www.freezenith.com
    - api.freezenith.com
    - demo-ms.freezenith.com
    - demo-cloud.freezenith.com

# -- Ingress (Traefik IngressRoutes)
ingress:
  landing:
    hosts:
      - freezenith.com
      - www.freezenith.com
    tlsSecret: freezenith-tls
  api:
    host: api.freezenith.com
    tlsSecret: freezenith-tls
  demoMc:
    host: demo-ms.freezenith.com
    tlsSecret: freezenith-tls
  demoWeb:
    host: demo-cloud.freezenith.com
    tlsSecret: freezenith-tls

# -- Customer Tenants
# Each tenant gets its own namespace, MC deployment, Web deployment,
# certificate, and ingress routes.
tenants: {}

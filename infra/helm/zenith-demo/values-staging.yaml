# Staging values for zenith-demo
# Demo is disabled in staging (enabled in production for freezenith.com)
namespace: zenith-staging
imageRegistry: ""  # set via Terraform
imagePullPolicy: IfNotPresent
imagePullSecret: ""  # set via Terraform

mc:
  enabled: true
  replicas: 1
  image: zenith-mc:0.3.1
  port: 3100
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

web:
  enabled: true
  replicas: 1
  image: zenith-web:0.2.0
  port: 3000
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

ingress:
  mc:
    host: ms.stage.freezenith.com
    tlsSecret: staging-tls
  web:
    host: cloud.stage.freezenith.com
    tlsSecret: staging-tls

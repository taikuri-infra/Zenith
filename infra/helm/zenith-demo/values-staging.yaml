# Staging values for zenith-demo
# Demo is disabled in staging (enabled in production for freezenith.com)
namespace: zenith-staging
imageRegistry: ""  # set via Terraform
imagePullPolicy: IfNotPresent
imagePullSecret: "harbor-registry"

mc:
  enabled: true
  replicas: 1
  image: zenith-mc:sha-9a507a7
  port: 3100
  env:
    NEXT_PUBLIC_API_URL: "https://api.stage.freezenith.com"
    NEXT_PUBLIC_DEMO_MODE: "false"
    NEXT_PUBLIC_LANDING_URL: "https://stage.freezenith.com"
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

web:
  enabled: true
  replicas: 1
  image: zenith-web:sha-51e346d
  port: 3000
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

ingress:
  mc:
    host: ms.stage.freezenith.com
    tlsSecret: staging-tls
  web:
    host: cloud.stage.freezenith.com
    tlsSecret: staging-tls

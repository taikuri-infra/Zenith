{{- if .Values.mc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-mc-demo
  namespace: {{ .Values.namespace }}
  labels:
    app: zenith-mc-demo
    app.kubernetes.io/name: zenith-mc-demo
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: mission-control-demo
spec:
  replicas: {{ .Values.mc.replicas }}
  selector:
    matchLabels:
      app: zenith-mc-demo
  template:
    metadata:
      labels:
        app: zenith-mc-demo
        app.kubernetes.io/name: zenith-mc-demo
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: mission-control-demo
    spec:
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: zenith-mc-demo
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: mission-control
          image: {{ include "zenith.image" (dict "registry" .Values.imageRegistry "image" .Values.mc.image) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          {{- if .Values.mc.env }}
          env:
            {{- range $key, $value := .Values.mc.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.mc.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.mc.resources | nindent 12 }}
          volumeMounts:
            - name: next-static
              mountPath: /app/apps/mission-control/.next/static
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      initContainers:
        - name: copy-static
          image: {{ include "zenith.image" (dict "registry" .Values.imageRegistry "image" .Values.mc.image) }}
          command: ["sh", "-c", "cp -r /app/apps/mission-control/.next/static/* /static/"]
          volumeMounts:
            - name: next-static
              mountPath: /static
      volumes:
        - name: next-static
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-mc-demo
  namespace: {{ .Values.namespace }}
  labels:
    app: zenith-mc-demo
    app.kubernetes.io/name: zenith-mc-demo
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: mission-control-demo
spec:
  ports:
    - name: http
      port: {{ .Values.mc.port }}
      targetPort: {{ .Values.mc.port }}
      protocol: TCP
  selector:
    app: zenith-mc-demo
{{- end }}
---

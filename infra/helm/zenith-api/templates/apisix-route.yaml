{{- if .Values.ingress.apisixEnabled }}
---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: zenith-api-public
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  http:
    - name: api-public
      match:
        hosts:
          - {{ .Values.ingress.host }}
        paths:
          - /health
          - /ready
          - /api/v1/auth/*
          - /api/v1/auth-pools/*/signup
          - /api/v1/auth-pools/*/login
          - /api/v1/auth-pools/*/logout
          - /api/v1/auth-pools/*/refresh
          - /api/v1/auth-pools/*/forgot-password
          - /api/v1/auth-pools/*/reset-password
          - /api/v1/auth-pools/*/user
          - /api/v1/auth-pools/*/user/password
          - /api/v1/auth-pools/*/user/metadata
          - /api/v1/auth-pools/*/token
          - /api/v1/auth-pools/*/anonymous
          - /api/v1/auth-pools/*/magic-link
          - /api/v1/auth-pools/*/magic-link/verify
          - /api/v1/auth-pools/*/authorize
          - /api/v1/auth-pools/*/token/code
      backends:
        - serviceName: zenith-api
          servicePort: {{ .Values.port }}
      plugins:
        - name: cors
          enable: true
          config:
            allow_origins: {{ .Values.ingress.apisixCorsOrigins | default "**" | quote }}
            allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
            allow_headers: "Content-Type,Authorization,X-Requested-With"
            allow_credential: true
        - name: limit-count
          enable: true
          config:
            count: 30
            time_window: 60
            rejected_code: 429
            key_type: var
            key: remote_addr
---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: zenith-api-protected
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  http:
    - name: api-protected
      match:
        hosts:
          - {{ .Values.ingress.host }}
        paths:
          - /api/*
      backends:
        - serviceName: zenith-api
          servicePort: {{ .Values.port }}
      plugins:
        - name: cors
          enable: true
          config:
            allow_origins: {{ .Values.ingress.apisixCorsOrigins | default "**" | quote }}
            allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
            allow_headers: "Content-Type,Authorization,X-Requested-With"
            allow_credential: true
        - name: limit-count
          enable: true
          config:
            count: 500
            time_window: 60
            rejected_code: 429
            key_type: var
            key: remote_addr
{{- end }}

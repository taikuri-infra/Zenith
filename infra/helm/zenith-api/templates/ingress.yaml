{{- if .Values.ingress.apisixEnabled }}
---
# ExternalName Service to bridge Traefik (local namespace) → APISIX gateway
# (in apisix namespace). Required because Traefik does not allow cross-namespace
# service references by default (needs allowCrossNamespace=true).
apiVersion: v1
kind: Service
metadata:
  name: apisix-gateway-proxy
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ExternalName
  externalName: apisix-gateway.apisix.svc.cluster.local
  ports:
    - port: 80
      protocol: TCP
{{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zenith-api
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        {{- if .Values.ingress.apisixEnabled }}
        - name: apisix-gateway-proxy
          port: 80
        {{- else if .Values.ingress.kongEnabled }}
        - name: kong-gateway-proxy
          namespace: kong
          port: 80
        {{- else }}
        - name: zenith-api
          port: {{ .Values.port }}
        {{- end }}
  tls:
    secretName: {{ .Values.ingress.tlsSecret }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zenith-api-redirect
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
      services:
        {{- if .Values.ingress.apisixEnabled }}
        - name: apisix-gateway-proxy
          port: 80
        {{- else if .Values.ingress.kongEnabled }}
        - name: kong-gateway-proxy
          namespace: kong
          port: 80
        {{- else }}
        - name: zenith-api
          port: {{ .Values.port }}
        {{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-api
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: zenith-api
  template:
    metadata:
      labels:
        app: zenith-api
        app.kubernetes.io/name: zenith-api
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: zenith-api
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "zenith.image" (dict "registry" .Values.imageRegistry "image" .Values.image) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
              protocol: TCP
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: jwt-secret
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: admin-password
            - name: CORS_ORIGINS
              value: {{ .Values.env.CORS_ORIGINS | quote }}
            {{- if .Values.env.K8S_MODE }}
            - name: K8S_MODE
              value: {{ .Values.env.K8S_MODE | quote }}
            {{- end }}
            {{- if .Values.env.ZENITH_MODE }}
            - name: ZENITH_MODE
              value: {{ .Values.env.ZENITH_MODE | quote }}
            {{- end }}
            {{- if .Values.env.REGISTRY }}
            - name: REGISTRY
              value: {{ .Values.env.REGISTRY | quote }}
            {{- end }}
            {{- if .Values.env.BASE_DOMAIN }}
            - name: BASE_DOMAIN
              value: {{ .Values.env.BASE_DOMAIN | quote }}
            {{- end }}
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: zenith-postgres-app
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: zenith-postgres-app
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: zenith-postgres-app
                  key: username
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: zenith-postgres-app
                  key: dbname
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenith-postgres-app
                  key: password
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-api
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: api
spec:
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
    - name: metrics
      port: {{ .Values.metricsPort }}
      targetPort: {{ .Values.metricsPort }}
  selector:
    app: zenith-api

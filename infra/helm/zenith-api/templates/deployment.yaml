---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-api
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: zenith-api
  template:
    metadata:
      labels:
        app: zenith-api
        app.kubernetes.io/name: zenith-api
        app.kubernetes.io/part-of: zenith
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: zenith-api
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: zenith-api
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: api
          image: {{ include "zenith.image" (dict "registry" .Values.imageRegistry "image" .Values.image) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
              protocol: TCP
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: jwt-secret
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: admin-password
            - name: CORS_ORIGINS
              value: {{ .Values.env.CORS_ORIGINS | quote }}
            {{- if .Values.env.K8S_MODE }}
            - name: K8S_MODE
              value: {{ .Values.env.K8S_MODE | quote }}
            {{- end }}
            {{- if .Values.env.ZENITH_MODE }}
            - name: ZENITH_MODE
              value: {{ .Values.env.ZENITH_MODE | quote }}
            {{- end }}
            {{- if .Values.env.REGISTRY }}
            - name: REGISTRY
              value: {{ .Values.env.REGISTRY | quote }}
            {{- end }}
            {{- if .Values.env.BASE_DOMAIN }}
            - name: BASE_DOMAIN
              value: {{ .Values.env.BASE_DOMAIN | quote }}
            {{- end }}
            {{- if .Values.env.GATEWAY_DOMAIN }}
            - name: GATEWAY_DOMAIN
              value: {{ .Values.env.GATEWAY_DOMAIN | quote }}
            {{- end }}
            {{- if .Values.env.TEMPORAL_ENABLED }}
            - name: TEMPORAL_ENABLED
              value: {{ .Values.env.TEMPORAL_ENABLED | quote }}
            {{- end }}
            {{- if .Values.env.TEMPORAL_HOST }}
            - name: TEMPORAL_HOST
              value: {{ .Values.env.TEMPORAL_HOST | quote }}
            {{- end }}
            {{- if .Values.env.TEMPORAL_NAMESPACE }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.env.TEMPORAL_NAMESPACE | quote }}
            {{- end }}
            {{- if .Values.env.KEYCLOAK_URL }}
            - name: KEYCLOAK_URL
              value: {{ .Values.env.KEYCLOAK_URL | quote }}
            {{- end }}
            {{- if .Values.env.KEYCLOAK_EXTERNAL_URL }}
            - name: KEYCLOAK_EXTERNAL_URL
              value: {{ .Values.env.KEYCLOAK_EXTERNAL_URL | quote }}
            {{- end }}
            {{- if .Values.keycloakAdminSecret }}
            - name: KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloakAdminSecret }}
                  key: admin-user
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloakAdminSecret }}
                  key: admin-password
            {{- end }}
            {{- if .Values.cnpgAdminSecret }}
            - name: CNPG_ADMIN_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpgAdminSecret }}
                  key: uri
            {{- end }}
            {{- if .Values.env.GITHUB_WEBHOOK_SECRET }}
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: github-webhook-secret
            {{- end }}
            {{- if .Values.env.SECRETS_ENCRYPTION_KEY }}
            - name: SECRETS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: secrets-encryption-key
            {{- end }}
            {{- if .Values.env.RESEND_API_KEY }}
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zenith-auth-secrets
                  key: resend-api-key
            {{- end }}
            {{- if .Values.env.APP_URL }}
            - name: APP_URL
              value: {{ .Values.env.APP_URL | quote }}
            {{- end }}
            {{- if .Values.env.GOOGLE_CLIENT_ID }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: zenith-auth-secrets
                  key: google-client-id
            {{- end }}
            {{- if .Values.env.GOOGLE_CLIENT_SECRET }}
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zenith-auth-secrets
                  key: google-client-secret
            {{- end }}
            {{- if .Values.env.GITHUB_CLIENT_ID }}
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: zenith-auth-secrets
                  key: github-client-id
            {{- end }}
            {{- if .Values.env.GITHUB_CLIENT_SECRET }}
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zenith-auth-secrets
                  key: github-client-secret
            {{- end }}
            {{- if .Values.env.S3_ENDPOINT }}
            - name: S3_ENDPOINT
              value: {{ .Values.env.S3_ENDPOINT | quote }}
            {{- end }}
            {{- if .Values.env.S3_REGION }}
            - name: S3_REGION
              value: {{ .Values.env.S3_REGION | quote }}
            {{- end }}
            {{- if .Values.env.S3_PLATFORM_BUCKET }}
            - name: S3_PLATFORM_BUCKET
              value: {{ .Values.env.S3_PLATFORM_BUCKET | quote }}
            {{- end }}
            {{- if .Values.env.S3_ACCESS_KEY }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: s3-access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: s3-secret-key
            {{- end }}
            {{- if .Values.env.AI_ENABLED }}
            - name: AI_ENABLED
              value: {{ .Values.env.AI_ENABLED | quote }}
            {{- end }}
            {{- if .Values.env.AI_LITELLM_URL }}
            - name: AI_LITELLM_URL
              value: {{ .Values.env.AI_LITELLM_URL | quote }}
            {{- end }}
            {{- if .Values.env.AI_MODEL }}
            - name: AI_MODEL
              value: {{ .Values.env.AI_MODEL | quote }}
            {{- end }}
            {{- if .Values.env.AI_API_KEY }}
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: ai-api-key
            {{- end }}
            {{- if .Values.env.OTEL_ENABLED }}
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "$(HOST_IP):4317"
            - name: OTEL_INSECURE
              value: {{ .Values.env.OTEL_INSECURE | default "true" | quote }}
            - name: OTEL_SAMPLE_RATE
              value: {{ .Values.env.OTEL_SAMPLE_RATE | default "1.0" | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.env.ENVIRONMENT | default "staging" | quote }}
            {{- end }}
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: zenith-postgres-app
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: zenith-postgres-app
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: zenith-postgres-app
                  key: username
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: zenith-postgres-app
                  key: dbname
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenith-postgres-app
                  key: password
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-api
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: api
spec:
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
    - name: metrics
      port: {{ .Values.metricsPort }}
      targetPort: {{ .Values.metricsPort }}
  selector:
    app: zenith-api

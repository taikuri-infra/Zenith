---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zenith-api
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zenith-api
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: api
rules:
  # Zenith CRDs (Project operator)
  - apiGroups: ["zenith.dev"]
    resources: ["projects"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["zenith.dev"]
    resources: ["projects/status"]
    verbs: ["get"]
  # Build jobs (Kaniko)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  # ConfigMaps (generated Dockerfiles)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "delete"]
  # Pod logs (build log streaming)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  # App deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # App services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # App ingress routes (Traefik)
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # KEDA HTTP scale-to-zero
  - apiGroups: ["http.keda.sh"]
    resources: ["httpscaledobjects"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Tenant provisioning: namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]
  # Tenant provisioning: secrets (no 'list' — principle of least privilege;
  # API only needs to get/create/delete known secrets in tenant namespaces)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
  # Tenant provisioning: resource quotas + limit ranges
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "create", "delete"]
  # Tenant provisioning: network policies (tenant isolation)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "create", "delete"]
  # APISIX routes (tenant provisioning + customer API gateways)
  - apiGroups: ["apisix.apache.org"]
    resources: ["apisixroutes"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Tenant provisioning: cert-manager certificates
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "create", "delete"]
  # Tenant provisioning + admin panel: ArgoCD applications
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "create", "delete"]
  # Admin panel + managed service provisioning: CNPG database clusters
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "backups", "scheduledbackups"]
    verbs: ["get", "list", "create", "update", "delete"]
  # Admin panel: Velero backup schedules
  - apiGroups: ["velero.io"]
    resources: ["schedules", "backups"]
    verbs: ["get", "list"]
  # Admin panel: Kyverno security policies
  - apiGroups: ["kyverno.io"]
    resources: ["clusterpolicies", "policies"]
    verbs: ["get", "list"]
  # Admin panel: PVC storage overview
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  # Admin panel: node/pod metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  # Admin panel: node listing
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zenith-api
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: zenith-api
subjects:
  - kind: ServiceAccount
    name: zenith-api
    namespace: {{ .Values.namespace }}

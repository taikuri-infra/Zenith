---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zenith-api
  namespace: {{ .Values.namespace }}
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zenith-api
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: api
rules:
  - apiGroups: ["zenith.dev"]
    resources: ["projects"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["zenith.dev"]
    resources: ["projects/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zenith-api
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: zenith-api
subjects:
  - kind: ServiceAccount
    name: zenith-api
    namespace: {{ .Values.namespace }}

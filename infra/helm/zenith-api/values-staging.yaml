# Staging values for zenith-api
namespace: zenith-staging
replicas: 1
image: zenith-api:0.3.6
imageRegistry: ""  # set via Terraform
imagePullPolicy: IfNotPresent
imagePullSecret: ""  # set via Terraform
port: 8080
metricsPort: 9090

env:
  CORS_ORIGINS: "https://stage.freezenith.com,https://ms.stage.freezenith.com,https://cloud.stage.freezenith.com,https://embermind-ms.stage.freezenith.com,https://embermind.stage.freezenith.com"
  K8S_MODE: "real"
  ZENITH_MODE: "saas"
  REGISTRY: "registry.stage.freezenith.com/zenith-stage"
  BASE_DOMAIN: "apps.stage.freezenith.com"
  TEMPORAL_ENABLED: "true"
  TEMPORAL_HOST: "temporal-frontend.temporal.svc.cluster.local:7233"
  TEMPORAL_NAMESPACE: "default"

cnpgAdminSecret: "cnpg-admin-dsn"

ingress:
  host: api.stage.freezenith.com
  tlsSecret: staging-tls
  kongEnabled: false

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 200m

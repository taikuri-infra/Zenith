# Staging values for zenith-api
namespace: zenith-staging
replicas: 1
image: zenith-api:0.7.19
imageRegistry: ""  # set via Terraform
imagePullPolicy: IfNotPresent
imagePullSecret: ""  # set via Terraform
port: 8080
metricsPort: 9090

env:
  CORS_ORIGINS: "https://app.stage.freezenith.com,https://stage.freezenith.com,https://ms.stage.freezenith.com,https://cloud.stage.freezenith.com,https://embermind-ms.stage.freezenith.com,https://embermind.stage.freezenith.com"
  K8S_MODE: "real"
  ZENITH_MODE: "saas"
  REGISTRY: "registry.stage.freezenith.com/zenith-stage"
  BASE_DOMAIN: "apps.stage.freezenith.com"
  GATEWAY_DOMAIN: "gw.stage.freezenith.com"
  KEYCLOAK_URL: "http://keycloak.keycloak.svc.cluster.local"
  TEMPORAL_ENABLED: "true"
  TEMPORAL_HOST: "temporal-frontend.temporal.svc.cluster.local:7233"
  TEMPORAL_NAMESPACE: "default"
  GITHUB_WEBHOOK_SECRET: "true"  # actual value stored in zenith-secrets Secret
  SECRETS_ENCRYPTION_KEY: "true"  # actual value stored in zenith-secrets Secret
  RESEND_API_KEY: "true"  # actual value stored in zenith-secrets Secret
  APP_URL: "https://app.stage.freezenith.com"
  GOOGLE_CLIENT_ID: "true"  # actual value stored in zenith-auth-secrets Secret
  GOOGLE_CLIENT_SECRET: "true"  # actual value stored in zenith-auth-secrets Secret
  GITHUB_CLIENT_ID: "true"  # actual value stored in zenith-auth-secrets Secret
  GITHUB_CLIENT_SECRET: "true"  # actual value stored in zenith-auth-secrets Secret
  S3_ENDPOINT: "https://fsn1.your-objectstorage.com"
  S3_ACCESS_KEY: "true"  # actual value stored in zenith-secrets Secret
  S3_SECRET_KEY: "true"  # actual value stored in zenith-secrets Secret
  S3_REGION: "fsn1"
  S3_PLATFORM_BUCKET: "zenith-user-storage"

cnpgAdminSecret: "cnpg-admin-dsn"
keycloakAdminSecret: "keycloak-admin"

ingress:
  host: api.stage.freezenith.com
  tlsSecret: staging-tls
  apisixEnabled: true
  apisixCorsOrigins: "https://stage.freezenith.com,https://app.stage.freezenith.com"

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 200m

# Staging values for zenith-mc
namespace: zenith-staging
replicas: 1
image: zenith-mc:sha-e82f48a
imageRegistry: ""  # set via ArgoCD/Terraform
imagePullPolicy: IfNotPresent
imagePullSecret: ""  # set via ArgoCD/Terraform
port: 3100

env:
  NEXT_PUBLIC_API_URL: "https://api.stage.freezenith.com"
  NEXT_PUBLIC_LANDING_URL: "https://stage.freezenith.com"
  API_INTERNAL_URL: "http://zenith-api.zenith-staging.svc.cluster.local:8080"

ingress:
  enabled: false
  hosts:
    - ms.stage.freezenith.com
  tlsSecret: staging-tls

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 100m

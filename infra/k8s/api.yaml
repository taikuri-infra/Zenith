apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-api
  namespace: zenith-platform
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zenith-api
  template:
    metadata:
      labels:
        app: zenith-api
        app.kubernetes.io/name: zenith-api
    spec:
      containers:
        - name: api
          image: zenith-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: jwt-secret
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenith-secrets
                  key: admin-password
            - name: CORS_ORIGINS
              value: "https://ms.embermind.app,https://cloud.embermind.app,https://demo-ms.freezenith.com,https://demo-cloud.freezenith.com"
            - name: DB_HOST
              value: zenith-postgres.zenith-platform.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: zenith
            - name: DB_NAME
              value: zenith
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenith-db-credentials
                  key: db-password
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-api
  namespace: zenith-platform
  labels:
    app: zenith-api
    app.kubernetes.io/name: zenith-api
    app.kubernetes.io/part-of: zenith
spec:
  selector:
    app: zenith-api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http

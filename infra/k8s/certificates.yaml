# =============================================================================
# TLS Certificates via cert-manager (Let's Encrypt)
# =============================================================================

# freezenith.com platform domains
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: freezenith-tls
  namespace: zenith-platform
spec:
  secretName: freezenith-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - freezenith.com
    - www.freezenith.com
    - api.freezenith.com
    - demo-ms.freezenith.com
    - demo-cloud.freezenith.com
    - pitch.freezenith.com
    - demo-tachyon.freezenith.com
---
# embermind.app customer domains
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: embermind-tls
  namespace: zenith-embermind
spec:
  secretName: embermind-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - ms.embermind.app
    - cloud.embermind.app
---
# =============================================================================
# TLSStore: Set wildcard cert as default for user apps (zenith-apps namespace)
# All IngressRoutes with `tls: {}` will use this cert automatically
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: zenith-apps
spec:
  defaultCertificate:
    secretName: apps-wildcard-tls

---
# roles/traefik-config — Traefik middlewares (installed by k3s, we just configure)

- name: Create redirect-to-https middleware in platform namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: redirect-to-https
        namespace: "{{ platform_namespace }}"
      spec:
        redirectScheme:
          scheme: https
          permanent: true
  tags: [traefik, infra]

- name: Create redirect-to-https middleware in customer namespaces
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: redirect-to-https
        namespace: "{{ item.namespace }}"
      spec:
        redirectScheme:
          scheme: https
          permanent: true
  loop: "{{ customer_tenants }}"
  when: customer_tenants | length > 0
  tags: [traefik, infra]

---
# roles/zenith-namespaces — Create namespaces and secrets

- name: Create platform namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ platform_namespace }}"
        labels:
          app.kubernetes.io/part-of: zenith
  tags: [deploy, namespaces]

- name: Create customer tenant namespaces
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ item.namespace }}"
        labels:
          app.kubernetes.io/part-of: zenith
          zenith.dev/tenant: "{{ item.name }}"
          zenith.dev/domain: "{{ item.mc_domain | regex_replace('^ms\\.', '') }}"
  loop: "{{ customer_tenants }}"
  tags: [deploy, namespaces]

- name: Create zenith-secrets in platform namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: zenith-secrets
        namespace: "{{ platform_namespace }}"
        labels:
          app.kubernetes.io/part-of: zenith
      type: Opaque
      stringData:
        jwt-secret: "{{ vault_jwt_secret }}"
        admin-email: "{{ vault_admin_email }}"
        admin-password: "{{ vault_admin_password }}"
  tags: [deploy, namespaces, secrets]

- name: Create zenith-db-credentials in platform namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: zenith-db-credentials
        namespace: "{{ platform_namespace }}"
        labels:
          app.kubernetes.io/part-of: zenith
          app.kubernetes.io/component: database
      type: Opaque
      stringData:
        db-password: "{{ vault_db_password }}"
  tags: [deploy, namespaces, secrets]

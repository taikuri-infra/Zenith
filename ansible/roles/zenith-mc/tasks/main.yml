---
# roles/zenith-mc — Mission Control deployments (demo + customer)

# --- Demo MC (platform namespace) ---
- name: Deploy zenith-mc-demo
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: zenith-mc-demo
        namespace: "{{ platform_namespace }}"
        labels:
          app: zenith-mc-demo
          app.kubernetes.io/name: zenith-mc-demo
          app.kubernetes.io/part-of: zenith
          app.kubernetes.io/component: mission-control-demo
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: zenith-mc-demo
        template:
          metadata:
            labels:
              app: zenith-mc-demo
              app.kubernetes.io/name: zenith-mc-demo
          spec:
            containers:
              - name: mission-control
                image: "zenith-mc-demo:{{ image_tag }}"
                imagePullPolicy: "{{ image_pull_policy }}"
                ports:
                  - containerPort: "{{ mc_port }}"
                    name: http
                    protocol: TCP
                resources:
                  requests:
                    cpu: "{{ resources.mc.requests.cpu }}"
                    memory: "{{ resources.mc.requests.memory }}"
                  limits:
                    cpu: "{{ resources.mc.limits.cpu }}"
                    memory: "{{ resources.mc.limits.memory }}"
                livenessProbe:
                  httpGet:
                    path: /
                    port: "{{ mc_port }}"
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                readinessProbe:
                  httpGet:
                    path: /
                    port: "{{ mc_port }}"
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
  when: enable_demo
  tags: [deploy, mc, demo]

- name: Create zenith-mc-demo service
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: zenith-mc-demo
        namespace: "{{ platform_namespace }}"
        labels:
          app: zenith-mc-demo
          app.kubernetes.io/name: zenith-mc-demo
          app.kubernetes.io/part-of: zenith
      spec:
        selector:
          app: zenith-mc-demo
        ports:
          - port: "{{ mc_port }}"
            targetPort: "{{ mc_port }}"
            protocol: TCP
            name: http
  when: enable_demo
  tags: [deploy, mc, demo]

# --- Customer MC (one per tenant) ---
- name: Deploy customer Mission Control
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: zenith-mc
        namespace: "{{ item.namespace }}"
        labels:
          app: zenith-mc
          app.kubernetes.io/name: zenith-mc
          app.kubernetes.io/part-of: zenith
          app.kubernetes.io/component: mission-control
          zenith.dev/tenant: "{{ item.name }}"
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: zenith-mc
        template:
          metadata:
            labels:
              app: zenith-mc
              app.kubernetes.io/name: zenith-mc
              zenith.dev/tenant: "{{ item.name }}"
          spec:
            containers:
              - name: mission-control
                image: "zenith-mc:{{ image_tag }}"
                imagePullPolicy: "{{ image_pull_policy }}"
                ports:
                  - containerPort: "{{ mc_port }}"
                    name: http
                    protocol: TCP
                resources:
                  requests:
                    cpu: "{{ resources.mc.requests.cpu }}"
                    memory: "{{ resources.mc.requests.memory }}"
                  limits:
                    cpu: "{{ resources.mc.limits.cpu }}"
                    memory: "{{ resources.mc.limits.memory }}"
                livenessProbe:
                  httpGet:
                    path: /
                    port: "{{ mc_port }}"
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                readinessProbe:
                  httpGet:
                    path: /
                    port: "{{ mc_port }}"
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
  loop: "{{ customer_tenants }}"
  tags: [deploy, mc, customers]

- name: Create customer MC services
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: zenith-mc
        namespace: "{{ item.namespace }}"
        labels:
          app: zenith-mc
          app.kubernetes.io/name: zenith-mc
          app.kubernetes.io/part-of: zenith
          zenith.dev/tenant: "{{ item.name }}"
      spec:
        selector:
          app: zenith-mc
        ports:
          - port: "{{ mc_port }}"
            targetPort: "{{ mc_port }}"
            protocol: TCP
            name: http
  loop: "{{ customer_tenants }}"
  tags: [deploy, mc, customers]

# --- Restart all MC deployments ---
- name: Restart zenith-mc-demo
  ansible.builtin.command: >
    k3s kubectl rollout restart deployment/zenith-mc-demo
    -n {{ platform_namespace }}
  when: enable_demo
  changed_when: true
  tags: [deploy, mc, restart]

- name: Restart customer MC deployments
  ansible.builtin.command: >
    k3s kubectl rollout restart deployment/zenith-mc
    -n {{ item.namespace }}
  loop: "{{ customer_tenants }}"
  changed_when: true
  tags: [deploy, mc, restart]

- name: Wait for MC rollouts
  ansible.builtin.command: >
    k3s kubectl rollout status deployment/zenith-mc
    -n {{ item.namespace }} --timeout=120s
  loop: "{{ customer_tenants }}"
  changed_when: false
  tags: [deploy, mc]

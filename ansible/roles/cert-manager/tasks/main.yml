---
# roles/cert-manager — Install cert-manager + ClusterIssuer

- name: Add cert-manager Helm repo
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io
    kubeconfig: "{{ kubeconfig_path }}"
  tags: [cert-manager, infra]

- name: Install cert-manager via Helm
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    chart_version: "{{ cert_manager_version }}"
    release_namespace: cert-manager
    create_namespace: true
    kubeconfig: "{{ kubeconfig_path }}"
    values:
      crds:
        enabled: true
      replicaCount: 1
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    wait: true
    wait_timeout: 300s
  tags: [cert-manager, infra]

- name: Wait for cert-manager webhook to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: cert-manager
    label_selectors:
      - app.kubernetes.io/component=webhook
    kubeconfig: "{{ kubeconfig_path }}"
  register: webhook_pods
  retries: 30
  delay: 10
  until: >-
    webhook_pods.resources | length > 0 and
    webhook_pods.resources[0].status.phase == 'Running'
  tags: [cert-manager, infra]

- name: Create letsencrypt-prod ClusterIssuer
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-prod
      spec:
        acme:
          server: https://acme-v02.api.letsencrypt.org/directory
          email: "{{ cert_issuer_email }}"
          privateKeySecretRef:
            name: letsencrypt-prod-key
          solvers:
            - http01:
                ingress:
                  ingressClassName: traefik
  tags: [cert-manager, infra]

---
# roles/zenith-landing — Landing page deployment

- name: Deploy zenith-landing
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: zenith-landing
        namespace: "{{ platform_namespace }}"
        labels:
          app: zenith-landing
          app.kubernetes.io/name: zenith-landing
          app.kubernetes.io/part-of: zenith
          app.kubernetes.io/component: landing
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: zenith-landing
        template:
          metadata:
            labels:
              app: zenith-landing
              app.kubernetes.io/name: zenith-landing
          spec:
            containers:
              - name: landing
                image: "zenith-landing:{{ image_tag }}"
                imagePullPolicy: "{{ image_pull_policy }}"
                ports:
                  - containerPort: "{{ landing_port }}"
                    name: http
                    protocol: TCP
                resources:
                  requests:
                    cpu: "{{ resources.landing.requests.cpu }}"
                    memory: "{{ resources.landing.requests.memory }}"
                  limits:
                    cpu: "{{ resources.landing.limits.cpu }}"
                    memory: "{{ resources.landing.limits.memory }}"
                livenessProbe:
                  httpGet:
                    path: /
                    port: "{{ landing_port }}"
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                readinessProbe:
                  httpGet:
                    path: /
                    port: "{{ landing_port }}"
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
  tags: [deploy, landing]

- name: Create zenith-landing service
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: zenith-landing
        namespace: "{{ platform_namespace }}"
        labels:
          app: zenith-landing
          app.kubernetes.io/name: zenith-landing
          app.kubernetes.io/part-of: zenith
      spec:
        selector:
          app: zenith-landing
        ports:
          - port: "{{ landing_port }}"
            targetPort: "{{ landing_port }}"
            protocol: TCP
            name: http
  tags: [deploy, landing]

- name: Restart zenith-landing deployment
  ansible.builtin.command: >
    k3s kubectl rollout restart deployment/zenith-landing
    -n {{ platform_namespace }}
  changed_when: true
  tags: [deploy, landing, restart]

- name: Wait for zenith-landing rollout
  ansible.builtin.command: >
    k3s kubectl rollout status deployment/zenith-landing
    -n {{ platform_namespace }} --timeout=120s
  changed_when: false
  tags: [deploy, landing]

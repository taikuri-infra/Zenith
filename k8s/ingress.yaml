---
# -----------------------------------------------------------------------------
# api.freezenith.com -> zenith-api:8080
# -----------------------------------------------------------------------------
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: freezenith-api
  namespace: zenith-platform
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`api.freezenith.com`)
      kind: Rule
      services:
        - name: zenith-api
          port: 8080
  tls:
    secretName: freezenith-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: freezenith-api-redirect
  namespace: zenith-platform
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`api.freezenith.com`)
      kind: Rule
      services:
        - name: zenith-api
          port: 8080
      middlewares:
        - name: redirect-to-https
---
# HTTPS redirect middleware (zenith-platform namespace)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: zenith-platform
spec:
  redirectScheme:
    scheme: https
    permanent: true
---

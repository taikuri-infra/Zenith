# =============================================================================
# TLS Certificates via cert-manager (Let's Encrypt)
# =============================================================================

# freezenith.com platform domains
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: freezenith-tls
  namespace: zenith-platform
spec:
  secretName: freezenith-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - freezenith.com
    - www.freezenith.com
    - demo.freezenith.com
    - api.freezenith.com
---
# embermind.app customer domains
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: embermind-tls
  namespace: zenith-embermind
spec:
  secretName: embermind-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - mission.embermind.app
    - cloud.embermind.app

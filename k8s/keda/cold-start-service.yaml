# cold-start-service.yaml — Tiny nginx serving the branded splash page.
# Deployed in zenith-apps namespace for Traefik error page middleware.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cold-start-page
  namespace: zenith-apps
  labels:
    zenith.dev/managed-by: zenith
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta http-equiv="refresh" content="3" />
      <title>Starting up...</title>
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0a0a0b;
          color: #e5e5e5;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container { text-align: center; max-width: 400px; padding: 2rem; }
        .logo {
          width: 48px; height: 48px; margin: 0 auto 1.5rem; border-radius: 12px;
          background: linear-gradient(135deg, #6366f1, #8b5cf6);
          display: flex; align-items: center; justify-content: center;
          font-size: 1.5rem; font-weight: 700; color: #fff;
        }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem; }
        p { font-size: 0.875rem; color: #737373; line-height: 1.5; }
        .spinner {
          margin: 1.5rem auto 0; width: 32px; height: 32px;
          border: 3px solid #262626; border-top-color: #6366f1;
          border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hint { margin-top: 1.5rem; font-size: 0.75rem; color: #525252; }
      </style>
    </head>
    <body>
      <div class="container">
        <div class="logo">Z</div>
        <h1>Starting up...</h1>
        <p>This app is waking from sleep mode. It will be ready in a few seconds.</p>
        <div class="spinner"></div>
        <p class="hint">This page refreshes automatically.</p>
      </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cold-start-page
  namespace: zenith-apps
  labels:
    app: cold-start-page
    zenith.dev/managed-by: zenith
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cold-start-page
  template:
    metadata:
      labels:
        app: cold-start-page
    spec:
      containers:
        - name: nginx
          image: nginx:1-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            limits:
              cpu: 50m
              memory: 32Mi
            requests:
              cpu: 10m
              memory: 16Mi
      volumes:
        - name: html
          configMap:
            name: cold-start-page
---
apiVersion: v1
kind: Service
metadata:
  name: cold-start-page
  namespace: zenith-apps
  labels:
    app: cold-start-page
    zenith.dev/managed-by: zenith
spec:
  selector:
    app: cold-start-page
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

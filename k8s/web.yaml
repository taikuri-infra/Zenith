apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-web
  namespace: zenith-embermind
  labels:
    app: zenith-web
    app.kubernetes.io/name: zenith-web
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: web
    zenith.dev/tenant: embermind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zenith-web
  template:
    metadata:
      labels:
        app: zenith-web
        app.kubernetes.io/name: zenith-web
        zenith.dev/tenant: embermind
    spec:
      containers:
        - name: web
          image: zenith-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-web
  namespace: zenith-embermind
  labels:
    app: zenith-web
    app.kubernetes.io/name: zenith-web
    app.kubernetes.io/part-of: zenith
    zenith.dev/tenant: embermind
spec:
  selector:
    app: zenith-web
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http

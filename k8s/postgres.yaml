apiVersion: v1
kind: Secret
metadata:
  name: zenith-db-credentials
  namespace: zenith-platform
  labels:
    app: zenith-postgres
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # Override these via kubectl create secret or Ansible/Terraform before first deploy
  db-password: "changeme"
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-postgres
  namespace: zenith-platform
  labels:
    app: zenith-postgres
    app.kubernetes.io/name: zenith-postgres
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  selector:
    app: zenith-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zenith-postgres
  namespace: zenith-platform
  labels:
    app: zenith-postgres
    app.kubernetes.io/name: zenith-postgres
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: database
spec:
  serviceName: zenith-postgres
  replicas: 1
  selector:
    matchLabels:
      app: zenith-postgres
  template:
    metadata:
      labels:
        app: zenith-postgres
        app.kubernetes.io/name: zenith-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: zenith
            - name: POSTGRES_USER
              value: zenith
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenith-db-credentials
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "zenith"]
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "zenith"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

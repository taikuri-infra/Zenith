apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-landing
  namespace: zenith-platform
  labels:
    app: zenith-landing
    app.kubernetes.io/name: zenith-landing
    app.kubernetes.io/part-of: zenith
    app.kubernetes.io/component: landing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zenith-landing
  template:
    metadata:
      labels:
        app: zenith-landing
        app.kubernetes.io/name: zenith-landing
    spec:
      containers:
        - name: landing
          image: zenith-landing:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-landing
  namespace: zenith-platform
  labels:
    app: zenith-landing
    app.kubernetes.io/name: zenith-landing
    app.kubernetes.io/part-of: zenith
spec:
  selector:
    app: zenith-landing
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
